<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Field Trip</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1208;
    --parchment: #f5edd8;
    --parchment-dark: #e8d9b8;
    --parchment-mid: #eedfc4;
    --gold: #c9972c;
    --gold-light: #e8b84b;
    --gold-dim: #a07820;
    --muted: #6b5a3e;
    --disabled: #b8a88a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background-image:
      radial-gradient(ellipse at 20% 50%, #2a1f08 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, #1f1408 0%, transparent 50%);
  }

  #app { width: 100%; max-width: 680px; }

  /* ── Header ── */
  #header {
    text-align: center;
    margin-bottom: 2.5rem;
    opacity: 0;
    transform: translateY(-12px);
    animation: fadeUp 0.7s 0.1s forwards;
  }

  #header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    color: var(--gold-light);
    letter-spacing: 0.04em;
    text-shadow: 0 2px 16px rgba(201,151,44,0.25);
  }

  #header .subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  /* ── Book card ── */
  #book {
    background: var(--parchment);
    border-radius: 4px;
    box-shadow:
      0 2px 0 var(--gold-dim),
      0 8px 40px rgba(0,0,0,0.55),
      inset 0 1px 0 rgba(255,255,255,0.6);
    overflow: hidden;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.7s 0.3s forwards;
    position: relative;
  }

  /* Spine stripe */
  #book::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 6px;
    background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dim) 100%);
  }

  /* ── Narrator box ── */
  #narrator {
    padding: 2.2rem 2.4rem 2rem 2.8rem;
    border-bottom: 1px solid var(--parchment-dark);
    position: relative;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  #narrator-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-dim);
    font-weight: 500;
  }

  #narrator-text {
    font-size: 1.18rem;
    line-height: 1.75;
    color: var(--ink);
    font-weight: 300;
    font-style: italic;
    flex: 1;
  }

  /* Audio waveform indicator */
  #audio-indicator {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.78rem;
    color: var(--gold-dim);
    min-height: 1.2rem;
    opacity: 1;
    transition: opacity 0.3s;
  }

  #audio-indicator.hidden { opacity: 0; pointer-events: none; }

  .wave { display: flex; gap: 2px; align-items: center; }

  .wave span {
    display: block;
    width: 2px;
    background: var(--gold);
    border-radius: 2px;
    animation: waveBounce 0.8s ease-in-out infinite;
  }
  .wave span:nth-child(1) { height: 6px;  animation-delay: 0s; }
  .wave span:nth-child(2) { height: 12px; animation-delay: 0.1s; }
  .wave span:nth-child(3) { height: 8px;  animation-delay: 0.2s; }
  .wave span:nth-child(4) { height: 14px; animation-delay: 0.05s; }
  .wave span:nth-child(5) { height: 6px;  animation-delay: 0.15s; }

  @keyframes waveBounce {
    0%, 100% { transform: scaleY(1); }
    50%       { transform: scaleY(0.3); }
  }

  /* ── Choices ── */
  #choices {
    padding: 1.6rem 2.4rem 2rem 2.8rem;
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }

  #choices-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-dim);
    font-weight: 500;
    margin-bottom: 0.2rem;
  }

  .choice-btn {
    background: transparent;
    border: 1px solid var(--parchment-dark);
    border-left: 3px solid transparent;
    border-radius: 2px;
    padding: 0.85rem 1.2rem;
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 1.05rem;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    transition: border-color 0.18s, background 0.18s, color 0.18s, transform 0.12s;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .choice-btn::before {
    content: '›';
    color: var(--gold);
    font-size: 1.3rem;
    line-height: 1;
    flex-shrink: 0;
    transition: transform 0.18s;
  }

  .choice-btn:hover:not(:disabled) {
    background: var(--parchment-mid);
    border-left-color: var(--gold);
    transform: translateX(3px);
  }

  .choice-btn:hover:not(:disabled)::before { transform: translateX(2px); }
  .choice-btn:active:not(:disabled) { transform: translateX(3px) scale(0.99); }

  .choice-btn:disabled {
    color: var(--disabled);
    cursor: not-allowed;
    border-left-color: transparent;
  }

  .choice-btn:disabled::before { color: var(--disabled); }

  .choice-btn.visited { font-style: italic; color: var(--muted); }

  /* ── Loading / error ── */
  #status {
    padding: 3rem 2.4rem;
    text-align: center;
    color: var(--muted);
    font-style: italic;
    font-size: 1.05rem;
  }

  #status .big { font-size: 2rem; margin-bottom: 0.8rem; }
  #status code {
    background: var(--parchment-dark);
    padding: 0.1em 0.4em;
    border-radius: 3px;
    font-style: normal;
    font-size: 0.9em;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in { animation: fadeUp 0.35s ease forwards; }

  @media (max-width: 480px) {
    body { padding: 1rem; }
    #narrator, #choices { padding-left: 1.8rem; padding-right: 1.4rem; }
  }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <h1 id="title-text">Virtual Field Trip</h1>
    <div class="subtitle" id="subtitle-text">Interactive Story</div>
  </div>
  <div id="book">
    <div id="status"><div class="big">📖</div>Loading…</div>
  </div>
</div>

<audio id="player"></audio>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let data        = null;
let fileBase    = '';   // directory of the .vfjf file, with trailing slash, relative to site root
let currentNode = null;
let isPlaying   = false;
let visitedNodes = new Set();  // nodes visited via forward navigation (not back)
const player    = document.getElementById('player');

// ─── Init ────────────────────────────────────────────────────────────────────
async function init() {
  const params  = new URLSearchParams(location.search);
  const filePath = params.get('file');   // e.g. "Virtual_Feildtrips/Louvre_Museum/Louvre_Museum.VFJF"

  if (!filePath) {
    showError(
      'No file specified.<br>' +
      '<small>Add <code>?file=Virtual_Feildtrips/TripName/TripName.VFJF</code> to the URL.</small>'
    );
    return;
  }

  // Derive the base directory for resolving audio paths.
  // filePath is always relative to the repo root (same origin as Main.html).
  // Strip the filename to get the folder, then prepend a leading slash so it's
  // an absolute path from the site root — safe regardless of where Main.html lives.
  const slashIdx = filePath.lastIndexOf('/');
  const relDir   = slashIdx >= 0 ? filePath.substring(0, slashIdx + 1) : '';
  // Resolve to absolute path from site root
  fileBase = resolveFromPageRoot(relDir);

  // Fetch the VFJF (JSON) file
  const fetchUrl = resolveFromPageRoot(filePath);
  try {
    const res = await fetch(fetchUrl);
    if (!res.ok) throw new Error(`HTTP ${res.status} — ${fetchUrl}`);
    data = await res.json();
  } catch (e) {
    showError(`Could not load <em>${filePath}</em>.<br><small>${e.message}</small>`);
    return;
  }

  // Update page titles
  const title = data.root || 'Virtual Field Trip';
  document.title = title;
  document.getElementById('title-text').textContent = title;

  renderBook();
  goTo(data.start_node);
  const startNode = data.nodes[data.start_node];
  if (startNode && startNode.audio) {
    playAudioFile(buildAudioUrl(startNode.audio));
  }
}

// ─── Path helpers ─────────────────────────────────────────────────────────────
/**
 * Given a path that is relative to the repo root (not to Main.html's location),
 * return an absolute URL path rooted at the GitHub Pages site root.
 *
 * On GitHub Pages the site root equals the origin, so we just prefix with '/'.
 * If the repo is served from a subpath (e.g. /K12/) this function handles it by
 * anchoring everything relative to the origin root.
 */
function resolveFromPageRoot(relativePath) {
  // Build a URL using the page's origin so '/' means the site root.
  const url = new URL('/' + relativePath, location.origin);
  return url.pathname; // returns e.g. /Virtual_Feildtrips/Louvre_Museum/
}

/**
 * Given an audio path from the VFJF (e.g. "audio/entrance.mp3"),
 * return the full absolute path by joining it with the .vfjf file's directory.
 */
function buildAudioUrl(audioPath) {
  // audioPath is relative to the VFJF file's own folder (fileBase is absolute from site root)
  const url = new URL(fileBase + audioPath, location.origin);
  return url.href;
}

// ─── Navigation ──────────────────────────────────────────────────────────────
function goTo(nodeId) {
  const node = data.nodes[nodeId];
  if (!node) { console.warn('Unknown node:', nodeId); return; }

  visitedNodes.add(nodeId);
  currentNode = nodeId;

  renderNarrator(node);
  renderChoices(node);
}

function choiceClicked(choice) {
  if (isPlaying) return;

  if (choice.back) {
    // Back: navigate silently, no audio, no locking
    goTo(choice.next);
  } else {
    // Forward: navigate, then play narrator audio and lock until it finishes
    goTo(choice.next);
    const node = data.nodes[choice.next];
    if (node && node.audio) {
      playAudioFile(buildAudioUrl(node.audio));
    }
  }
}

// ─── Audio ───────────────────────────────────────────────────────────────────
function playAudioFile(src, onEnd) {
  player.pause();
  player.src = src;
  isPlaying = true;
  showWave(true);
  lockChoices(true);

  player.play().catch(() => finishAudio(onEnd)); // gracefully skip if blocked/missing

  player.onended = () => finishAudio(onEnd);
  player.onerror = () => finishAudio(onEnd);
}

function finishAudio(onEnd) {
  isPlaying = false;
  showWave(false);
  lockChoices(false);
  if (onEnd) onEnd();
}

// ─── Rendering ───────────────────────────────────────────────────────────────
function renderBook() {
  document.getElementById('book').innerHTML = `
    <div id="narrator">
      <div id="narrator-label">Narrator</div>
      <div id="narrator-text"></div>
      <div id="audio-indicator" class="hidden">
        <div class="wave">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        Playing…
      </div>
    </div>
    <div id="choices">
      <div id="choices-label">Your response</div>
    </div>
  `;
}

function renderNarrator(node) {
  const el = document.getElementById('narrator-text');
  el.style.animation = 'none';
  void el.offsetHeight; // force reflow to restart animation
  el.style.animation = '';
  el.classList.add('fade-in');
  el.textContent = node.text || '';
}

function renderChoices(node) {
  const container = document.getElementById('choices');
  const label     = document.getElementById('choices-label');
  container.innerHTML = '';
  container.appendChild(label);

  (node.choices || []).forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn fade-in';
    if (visitedNodes.has(choice.next)) btn.classList.add('visited');
    btn.textContent = choice.text;
    btn.addEventListener('click', () => choiceClicked(choice));
    container.appendChild(btn);
  });
}

function lockChoices(locked) {
  document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = locked);
}

function showWave(visible) {
  const el = document.getElementById('audio-indicator');
  if (el) el.classList.toggle('hidden', !visible);
}

function showError(html) {
  document.getElementById('book').innerHTML =
    `<div id="status"><div class="big">⚠️</div>${html}</div>`;
}

// ─── Go ──────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
