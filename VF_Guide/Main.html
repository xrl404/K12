<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Field Trip</title>

  <!-- Beatrice font faces — expects files at /K12/fonts/Beatrice-*.otf -->
  <style>
    @font-face { font-family: 'Beatrice'; src: url('/K12/fonts/Beatrice-Thin.otf') format('opentype'); font-weight: 100; font-style: normal; }
    @font-face { font-family: 'Beatrice'; src: url('/K12/fonts/Beatrice-ThinItalic.otf') format('opentype'); font-weight: 100; font-style: italic; }
    @font-face { font-family: 'Beatrice'; src: url('/K12/fonts/Beatrice-Light.otf') format('opentype'); font-weight: 300; font-style: normal; }
    @font-face { font-family: 'Beatrice'; src: url('/K12/fonts/Beatrice-LightItalic.otf') format('opentype'); font-weight: 300; font-style: italic; }
    @font-face { font-family: 'Beatrice'; src: url('/K12/fonts/Beatrice-Regular.otf') format('opentype'); font-weight: 400; font-style: normal; }
    @font-face { font-family: 'Beatrice'; src: url('/K12/fonts/Beatrice-RegularItalic.otf') format('opentype'); font-weight: 400; font-style: italic; }
    @font-face { font-family: 'Beatrice'; src: url('/K12/fonts/Beatrice-Medium.otf') format('opentype'); font-weight: 500; font-style: normal; }
    @font-face { font-family: 'Beatrice'; src: url('/K12/fonts/Beatrice-MediumItalic.otf') format('opentype'); font-weight: 500; font-style: italic; }
    @font-face { font-family: 'Beatrice'; src: url('/K12/fonts/Beatrice-SemiBold.otf') format('opentype'); font-weight: 600; font-style: normal; }
    @font-face { font-family: 'Beatrice'; src: url('/K12/fonts/Beatrice-SemiBoldItalic.otf') format('opentype'); font-weight: 600; font-style: italic; }
    @font-face { font-family: 'Beatrice'; src: url('/K12/fonts/Beatrice-Bold.otf') format('opentype'); font-weight: 700; font-style: normal; }
    @font-face { font-family: 'Beatrice'; src: url('/K12/fonts/Beatrice-BoldItalic.otf') format('opentype'); font-weight: 700; font-style: italic; }
    @font-face { font-family: 'Beatrice'; src: url('/K12/fonts/Beatrice-ExtraBold.otf') format('opentype'); font-weight: 800; font-style: normal; }
    @font-face { font-family: 'Beatrice'; src: url('/K12/fonts/Beatrice-ExtraBoldItalic.otf') format('opentype'); font-weight: 800; font-style: italic; }
  </style>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">

    <!-- Header: title + progress widget -->
    <div id="header">
      <div id="header-text">
        <h1 id="title-text">Virtual <em>Field Tour</em></h1>
        <div class="subtitle" id="subtitle-text">K12 Guide</div>
      </div>
      <div id="progress-widget">
        <div id="progress-label">Explored</div>
        <div id="progress-bar-track">
          <div id="progress-bar-fill"></div>
        </div>
        <div id="progress-pct">0%</div>
      </div>
    </div>

    <!-- Main card — content is rendered here by player.js -->
    <div id="book">
      <div id="strider-bg"></div>
      <div id="status"><div class="big">📖</div><p>Loading…</p></div>
    </div>

  </div>

  <!-- Hidden audio player -->
  <audio id="player"></audio>

  <script src="player.js"></script>
</body>
</html>
