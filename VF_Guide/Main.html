<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Field Trip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
/* ── Tokens ──────────────────────────────────────────────── */
:root {
  --bg:           #0c1120;
  --bg-mid:       #111827;
  --surface:      #161e30;
  --surface-2:    #1d2740;
  --border:       rgba(255,255,255,0.06);
  --border-hi:    rgba(255,255,255,0.11);

  --accent:       #5b8dee;
  --accent-glow:  rgba(91,141,238,0.18);
  --accent-soft:  rgba(91,141,238,0.45);
  --gold:         #f2c14e;
  --gold-glow:    rgba(242,193,78,0.12);

  --text:         #dde4f0;
  --text-2:       #7f8fa8;
  --text-3:       #445066;
  --disabled:     #3a4558;

  --font-ui:      'Sora', system-ui, sans-serif;
  --font-display: 'Fraunces', Georgia, serif;
  --radius:       14px;
  --radius-sm:    9px;
  --card-shadow:  0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,0.55);
}

/* ── Reset ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-ui);
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 55% at 10% 15%, rgba(91,141,238,0.07) 0%, transparent 65%),
    radial-gradient(ellipse 60% 45% at 90% 80%, rgba(242,193,78,0.05) 0%, transparent 60%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
}

/* ── App shell ───────────────────────────────────────────── */
#app { width: 100%; max-width: 640px; }

/* ── Header ──────────────────────────────────────────────── */
#header {
  text-align: center;
  margin-bottom: 2rem;
  opacity: 0;
  transform: translateY(-10px);
  animation: rise 0.55s 0.08s ease forwards;
}

#header h1 {
  font-family: var(--font-display);
  font-size: clamp(1.5rem, 4vw, 2.1rem);
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}

#header h1 em {
  font-style: italic;
  font-weight: 300;
  color: var(--accent);
}

#header .subtitle {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-top: 0.3rem;
}

/* ── Book card ───────────────────────────────────────────── */
#book {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--card-shadow);
  overflow: hidden;
  opacity: 0;
  transform: translateY(14px);
  animation: rise 0.55s 0.22s ease forwards;
  position: relative;
}

/* Top accent line */
#book::before {
  content: '';
  position: absolute;
  inset: 0 0 auto 0;
  height: 2px;
  background: linear-gradient(90deg,
    transparent 0%,
    var(--accent-soft) 25%,
    var(--accent) 50%,
    var(--accent-soft) 75%,
    transparent 100%);
  border-radius: var(--radius) var(--radius) 0 0;
}

/* ── Splash / start screen ───────────────────────────────── */
#splash {
  padding: 3rem 2.25rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.5rem;
  text-align: center;
}

#splash-icon {
  font-size: 3rem;
  line-height: 1;
}

#splash-title {
  font-family: var(--font-display);
  font-size: 1.25rem;
  font-weight: 300;
  color: var(--text);
  line-height: 1.6;
}

#splash-hint {
  font-size: 0.8rem;
  color: var(--text-3);
  max-width: 320px;
}

#start-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 0.85rem 2.5rem;
  font-family: var(--font-ui);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
  box-shadow: 0 4px 20px rgba(91,141,238,0.35);
}
#start-btn:hover  { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(91,141,238,0.45); }
#start-btn:active { transform: scale(0.98); }

/* ── Narrator box ────────────────────────────────────────── */
#narrator {
  padding: 2rem 2.25rem 1.75rem;
  border-bottom: 1px solid var(--border);
  position: relative;
  min-height: 140px;
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
}

#narrator-label {
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent-soft);
}

#narrator-text {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 300;
  line-height: 1.8;
  color: var(--text);
  flex: 1;
}

/* ── Audio indicator ─────────────────────────────────────── */
#audio-indicator {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  min-height: 1.1rem;
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--text-2);
  transition: opacity 0.25s;
}

#audio-indicator.hidden { opacity: 0; pointer-events: none; }

.wave { display: flex; align-items: center; gap: 2px; }

.wave span {
  display: block;
  width: 2.5px;
  border-radius: 3px;
  background: var(--accent);
  animation: waveBounce 0.85s ease-in-out infinite;
}
.wave span:nth-child(1) { height: 5px;  animation-delay: 0.00s; }
.wave span:nth-child(2) { height: 11px; animation-delay: 0.12s; }
.wave span:nth-child(3) { height: 7px;  animation-delay: 0.24s; }
.wave span:nth-child(4) { height: 13px; animation-delay: 0.06s; }
.wave span:nth-child(5) { height: 6px;  animation-delay: 0.18s; }

@keyframes waveBounce {
  0%, 100% { transform: scaleY(1); }
  50%       { transform: scaleY(0.2); }
}

/* ── Choices ─────────────────────────────────────────────── */
#choices {
  padding: 1.5rem 2.25rem 2rem;
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
}

#choices-label {
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 0.2rem;
}

.choice-btn {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.8rem 1.1rem;
  font-family: var(--font-ui);
  font-size: 0.93rem;
  font-weight: 400;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 0.65rem;
  transition: border-color 0.15s, background 0.15s, transform 0.1s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
}

/* Hover shimmer */
.choice-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(110deg, transparent 0%, var(--accent-glow) 100%);
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}

.choice-btn:hover:not(:disabled)::after   { opacity: 1; }
.choice-btn:hover:not(:disabled) {
  border-color: var(--accent-soft);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.choice-btn:active:not(:disabled) { transform: scale(0.99); }

/* Arrow icon */
.choice-btn::before {
  content: '›';
  font-size: 1.2rem;
  line-height: 1;
  color: var(--accent);
  flex-shrink: 0;
  transition: transform 0.15s, color 0.15s;
}
.choice-btn:hover:not(:disabled)::before { transform: translateX(2px); }

.choice-btn:disabled {
  color: var(--disabled);
  cursor: not-allowed;
  background: var(--surface);
}
.choice-btn:disabled::before { color: var(--text-3); }

.choice-btn.visited {
  font-style: italic;
  color: var(--text-2);
}
.choice-btn.visited::before { color: var(--text-3); }

/* ── Status / error ──────────────────────────────────────── */
#status {
  padding: 3.5rem 2rem;
  text-align: center;
  color: var(--text-2);
  font-size: 0.95rem;
}

#status .big { font-size: 2.2rem; margin-bottom: 0.75rem; }

#status p { font-style: italic; }

#status code {
  background: var(--surface-2);
  color: var(--accent);
  padding: 0.15em 0.45em;
  border-radius: 5px;
  font-style: normal;
  font-size: 0.85em;
}

/* ── Animations ──────────────────────────────────────────── */
@keyframes rise {
  to { opacity: 1; transform: translateY(0); }
}

.fade-in {
  opacity: 0;
  animation: rise 0.3s ease forwards;
}

/* ── Scrollbar ───────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 4px; }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 480px) {
  body { padding: 1rem 0.75rem; }
  #narrator, #choices { padding-left: 1.5rem; padding-right: 1.5rem; }
  #narrator-text { font-size: 1rem; }
  #splash { padding: 2.25rem 1.5rem; }
}
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <h1 id="title-text">Virtual <em>Field Trip</em></h1>
    <div class="subtitle" id="subtitle-text">K12 Guide</div>
  </div>
  <div id="book">
    <div id="status"><div class="big">📖</div><p>Loading…</p></div>
  </div>
</div>

<audio id="player"></audio>

<script>
// ─── State ────────────────────────────────────────────────
let data         = null;
let fileBase     = '';
let currentNode  = null;
let isPlaying    = false;
let visitedNodes = new Set();
const player     = document.getElementById('player');

// ─── Helpers ──────────────────────────────────────────────

/**
 * Escape a string for safe insertion into HTML text content.
 * Returns a DocumentFragment-safe text node when used with DOM APIs,
 * but we expose this for the rare places that still build HTML strings
 * (the static error screen, which uses only literal safe strings now).
 */
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;');
}

/**
 * Create a text node — the safest way to put user data into the DOM
 * without any risk of it being interpreted as HTML.
 */
function txt(str) {
  return document.createTextNode(String(str ?? ''));
}

/**
 * Validate that an audio path is a relative path (not a javascript: URI
 * or an absolute URL to an untrusted origin).
 * Returns the sanitised URL string, or null if the path is rejected.
 */
function sanitiseAudioPath(audioPath) {
  if (typeof audioPath !== 'string' || audioPath.trim() === '') return null;
  // Reject anything with a scheme (javascript:, data:, https://, etc.)
  // A relative path must NOT contain ":" before the first "/"
  const colonIdx = audioPath.indexOf(':');
  const slashIdx = audioPath.indexOf('/');
  if (colonIdx !== -1 && (slashIdx === -1 || colonIdx < slashIdx)) return null;
  // Reject attempts to escape the virtual directory
  if (audioPath.includes('..')) return null;
  return audioPath;
}

function buildAudioUrl(audioPath) {
  // fileBase always starts with '/' and ends with '/'
  return fileBase + audioPath;
}

// ─── Init ─────────────────────────────────────────────────
async function init() {
  const params   = new URLSearchParams(location.search);
  const filePath = params.get('file');

  if (!filePath) {
    showError(
      '⚠️',
      'No file specified.',
      // FIX: safe literal string — no user data interpolated
      'Add ?file=Virtual_Fieldtrips/TripName/TripName.VFJF to the URL.'
    );
    return;
  }

  // Derive the directory that audio paths will be relative to
  const slashIdx = filePath.lastIndexOf('/');
  const relDir   = slashIdx >= 0 ? filePath.slice(0, slashIdx + 1) : '';
  fileBase       = '/' + relDir;

  try {
    const res = await fetch('/' + filePath);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    data = await res.json();
  } catch (e) {
    // FIX: e.message and filePath are displayed via DOM text nodes in showError,
    // not interpolated into an innerHTML string.
    showError('⚠️', 'Could not load trip file.', e.message, filePath);
    return;
  }

  // Validate minimal structure
  if (!data.nodes || !data.start_node || !data.nodes[data.start_node]) {
    showError('⚠️', 'Invalid trip file.', 'Missing nodes or start_node.');
    return;
  }

  // FIX: set document.title via property (automatically text-safe)
  const tripTitle = String(data.root || 'Virtual Field Trip').trim();
  document.title  = tripTitle;

  // FIX: build the <h1> content with DOM nodes, not innerHTML
  const h1 = document.getElementById('title-text');
  h1.textContent = ''; // clear existing content
  const words = tripTitle.split(' ');
  if (words.length > 1) {
    h1.appendChild(txt(words.slice(0, -1).join(' ') + ' '));
  }
  const em = document.createElement('em');
  em.appendChild(txt(words[words.length - 1]));
  h1.appendChild(em);

  showSplash(tripTitle);
}

// ─── Splash (satisfies browser autoplay policy) ───────────
function showSplash(tripTitle) {
  const startNode = data.nodes[data.start_node];
  const hasAudio  = !!(startNode && startNode.audio);

  // FIX: build the splash screen with DOM APIs instead of innerHTML,
  // so tripTitle (and any other data-derived content) is always treated
  // as plain text, never as markup.
  const book = document.getElementById('book');
  book.textContent = ''; // clear

  const splash = document.createElement('div');
  splash.id = 'splash';

  const icon = document.createElement('div');
  icon.id = 'splash-icon';
  icon.textContent = '🌍';

  const title = document.createElement('div');
  title.id = 'splash-title';
  title.appendChild(txt(tripTitle)); // safe text node

  const hint = document.createElement('p');
  hint.id = 'splash-hint';
  hint.textContent = hasAudio
    ? 'Audio narration is included. Make sure your sound is on.'
    : 'Use the choices below to explore each stop on the trip.';

  const btn = document.createElement('button');
  btn.id = 'start-btn';
  btn.textContent = 'Begin Trip →';
  btn.addEventListener('click', () => {
    renderShell();
    goTo(data.start_node, /* playAudio */ true);
  });

  splash.appendChild(icon);
  splash.appendChild(title);
  splash.appendChild(hint);
  splash.appendChild(btn);
  book.appendChild(splash);
}

// ─── Shell (narrator + choices region) ───────────────────
function renderShell() {
  // FIX: all content here is static/trusted, but we use DOM construction
  // consistently to prevent future regressions if dynamic data is added.
  const book = document.getElementById('book');
  book.textContent = '';

  const narrator = document.createElement('div');
  narrator.id = 'narrator';

  const narratorLabel = document.createElement('div');
  narratorLabel.id = 'narrator-label';
  narratorLabel.textContent = 'Narrator';

  const narratorText = document.createElement('div');
  narratorText.id = 'narrator-text';

  const audioIndicator = document.createElement('div');
  audioIndicator.id = 'audio-indicator';
  audioIndicator.className = 'hidden';

  const wave = document.createElement('div');
  wave.className = 'wave';
  for (let i = 0; i < 5; i++) {
    wave.appendChild(document.createElement('span'));
  }
  audioIndicator.appendChild(wave);
  audioIndicator.appendChild(txt('Playing…'));

  narrator.appendChild(narratorLabel);
  narrator.appendChild(narratorText);
  narrator.appendChild(audioIndicator);

  const choices = document.createElement('div');
  choices.id = 'choices';

  const choicesLabel = document.createElement('div');
  choicesLabel.id = 'choices-label';
  choicesLabel.textContent = 'Your response';

  choices.appendChild(choicesLabel);

  book.appendChild(narrator);
  book.appendChild(choices);
}

// ─── Navigation ───────────────────────────────────────────
function goTo(nodeId, playAudio = false) {
  const node = data.nodes[nodeId];
  if (!node) { console.warn('Unknown node:', nodeId); return; }

  visitedNodes.add(nodeId);
  currentNode = nodeId;

  renderNarrator(node);
  renderChoices(node);

  if (playAudio && node.audio) {
    const safePath = sanitiseAudioPath(node.audio);
    if (safePath) {
      playAudioFile(buildAudioUrl(safePath));
    } else {
      console.warn('Rejected unsafe audio path:', node.audio);
    }
  }
}

function choiceClicked(choice) {
  if (isPlaying) return;
  goTo(choice.next, /* playAudio */ !choice.back);
}

// ─── Audio ────────────────────────────────────────────────
function playAudioFile(src) {
  player.pause();
  player.src = src;
  isPlaying  = true;
  setWave(true);
  lockChoices(true);

  const done = () => {
    isPlaying = false;
    setWave(false);
    lockChoices(false);
    player.onended = null;
    player.onerror = null;
  };

  player.onended = done;
  player.onerror = (e) => {
    console.warn('Audio error:', src, e);
    done();
  };

  player.play().catch((e) => {
    console.warn('play() rejected:', e);
    done();
  });
}

// ─── Rendering ────────────────────────────────────────────
function renderNarrator(node) {
  const el = document.getElementById('narrator-text');
  // Restart animation
  el.style.animation = 'none';
  void el.offsetHeight;
  el.style.animation = '';
  el.classList.add('fade-in');
  // FIX: was already using textContent (safe) — kept as-is
  el.textContent = node.text || '';
}

function renderChoices(node) {
  const container = document.getElementById('choices');

  // Keep the label, remove old buttons
  const label = document.getElementById('choices-label');
  container.textContent = ''; // FIX: was innerHTML = '' (safe here, but textContent is clearer)
  container.appendChild(label);

  const choices = node.choices || [];
  if (choices.length === 0) {
    const end = document.createElement('p');
    end.style.cssText = 'color:var(--text-3);font-size:0.85rem;font-style:italic;margin-top:0.5rem;';
    end.textContent = '— End of trip —';
    container.appendChild(end);
    return;
  }

  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn fade-in';
    if (visitedNodes.has(choice.next)) btn.classList.add('visited');
    // FIX: was already using textContent (safe) — kept as-is
    btn.textContent = choice.text;
    btn.addEventListener('click', () => choiceClicked(choice));
    container.appendChild(btn);
  });
}

function lockChoices(locked) {
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.disabled = locked;
  });
}

function setWave(visible) {
  const el = document.getElementById('audio-indicator');
  if (el) el.classList.toggle('hidden', !visible);
}

// ─── Error screen ─────────────────────────────────────────
/**
 * FIX: was using innerHTML with potentially user-controlled strings
 * (e.message, filePath). Now builds the error UI with DOM nodes so
 * every string is treated as plain text, never markup.
 *
 * @param {string} icon      - Emoji / safe literal
 * @param {string} headline  - Short description (may be user-derived)
 * @param {string} [detail]  - Technical detail, e.g. e.message
 * @param {string} [file]    - The file path that failed to load
 */
function showError(icon, headline, detail = '', file = '') {
  const book = document.getElementById('book');
  book.textContent = '';

  const status = document.createElement('div');
  status.id = 'status';

  const big = document.createElement('div');
  big.className = 'big';
  big.textContent = icon;

  const p1 = document.createElement('p');
  p1.appendChild(txt(headline));

  status.appendChild(big);
  status.appendChild(p1);

  if (file) {
    const pFile = document.createElement('p');
    pFile.style.cssText = 'margin-top:0.5rem;font-size:0.85rem;';
    pFile.appendChild(txt('File: '));
    const code = document.createElement('code');
    code.appendChild(txt(file)); // safe text node — no innerHTML
    pFile.appendChild(code);
    status.appendChild(pFile);
  }

  if (detail) {
    const p2 = document.createElement('p');
    p2.style.cssText = 'margin-top:0.35rem;font-size:0.85rem;';
    p2.appendChild(txt(detail)); // safe text node — no innerHTML
    status.appendChild(p2);
  }

  book.appendChild(status);
}

// ─── Boot ─────────────────────────────────────────────────
init();
</script>
</body>
</html>
