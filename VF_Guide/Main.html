<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Field Trip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:           #0c1120;
  --bg-mid:       #111827;
  --surface:      #161e30;
  --surface-2:    #1d2740;
  --border:       rgba(255,255,255,0.06);
  --border-hi:    rgba(255,255,255,0.11);
  --accent:       #5b8dee;
  --accent-glow:  rgba(91,141,238,0.18);
  --accent-soft:  rgba(91,141,238,0.45);
  --gold:         #f2c14e;
  --gold-soft:    rgba(242,193,78,0.15);
  --green:        #4ade80;
  --green-soft:   rgba(74,222,128,0.15);
  --text:         #dde4f0;
  --text-2:       #7f8fa8;
  --text-3:       #445066;
  --disabled:     #3a4558;
  --font-ui:      'Sora', system-ui, sans-serif;
  --font-display: 'Fraunces', Georgia, serif;
  --radius:       14px;
  --radius-sm:    9px;
  --card-shadow:  0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,0.55);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-ui);
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 55% at 10% 15%, rgba(91,141,238,0.07) 0%, transparent 65%),
    radial-gradient(ellipse 60% 45% at 90% 80%, rgba(242,193,78,0.05) 0%, transparent 60%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
}

#app { width: 100%; max-width: 640px; }

/* ── Header ──────────────────────────────────────────────── */
#header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1.25rem;
  margin-bottom: 2rem;
  opacity: 0;
  transform: translateY(-10px);
  animation: rise 0.55s 0.08s ease forwards;
}

#header-text { text-align: left; flex: 1; }

#header h1 {
  font-family: var(--font-display);
  font-size: clamp(1.3rem, 4vw, 2.1rem);
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}

#header h1 em {
  font-style: italic;
  font-weight: 300;
  color: var(--accent);
}

#header .subtitle {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-top: 0.3rem;
}

/* ── Progress widget (top-right) ─────────────────────────── */
#progress-widget {
  display: none;
  flex-direction: column;
  align-items: flex-end;
  gap: 0.35rem;
  flex-shrink: 0;
  min-width: 110px;
}

#progress-label {
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-3);
}

#progress-bar-track {
  width: 100%;
  height: 6px;
  background: var(--surface-2);
  border-radius: 99px;
  overflow: hidden;
  border: 1px solid var(--border);
}

#progress-bar-fill {
  height: 100%;
  width: 0%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--accent) 0%, #8ab4f8 100%);
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1), background 0.5s ease;
}

#progress-bar-fill.complete {
  background: linear-gradient(90deg, var(--green) 0%, #86efac 100%);
}

#progress-pct {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-2);
  letter-spacing: 0.04em;
  transition: color 0.4s;
}

#progress-pct.complete { color: var(--green); }

/* ── Book card ───────────────────────────────────────────── */
#book {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--card-shadow);
  overflow: hidden;
  opacity: 0;
  transform: translateY(14px);
  animation: rise 0.55s 0.22s ease forwards;
  position: relative;
}

#book::before {
  content: '';
  position: absolute;
  inset: 0 0 auto 0;
  height: 2px;
  background: linear-gradient(90deg,
    transparent 0%, var(--accent-soft) 25%, var(--accent) 50%,
    var(--accent-soft) 75%, transparent 100%);
  border-radius: var(--radius) var(--radius) 0 0;
  transition: background 0.6s ease;
}

#book.complete::before {
  background: linear-gradient(90deg,
    transparent 0%, rgba(74,222,128,0.45) 25%, var(--green) 50%,
    rgba(74,222,128,0.45) 75%, transparent 100%);
}

/* ── Splash ──────────────────────────────────────────────── */
#splash {
  padding: 3rem 2.25rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.5rem;
  text-align: center;
}
#splash-icon { font-size: 3rem; line-height: 1; }
#splash-title {
  font-family: var(--font-display);
  font-size: 1.25rem;
  font-weight: 300;
  color: var(--text);
  line-height: 1.6;
}
#splash-hint { font-size: 0.8rem; color: var(--text-3); max-width: 320px; }
#start-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 0.85rem 2.5rem;
  font-family: var(--font-ui);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
  box-shadow: 0 4px 20px rgba(91,141,238,0.35);
}
#start-btn:hover  { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(91,141,238,0.45); }
#start-btn:active { transform: scale(0.98); }

/* ── Narrator box ────────────────────────────────────────── */
#narrator {
  padding: 2rem 2.25rem 1.75rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 0.85rem;
}

#narrator-label {
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent-soft);
}

/* ── Q row ───────────────────────────────────────────────── */
#qa-question {
  display: none;
  align-items: flex-start;
  gap: 0.65rem;
  padding-bottom: 0.85rem;
  border-bottom: 1px solid var(--border);
}
#qa-question.visible { display: flex; }

.qa-label {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  flex-shrink: 0;
  padding-top: 0.3em;
  min-width: 1.6rem;
}
.qa-label.q { color: var(--gold); }
.qa-label.a { color: var(--accent); }

#qa-question-text {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 300;
  font-style: italic;
  color: var(--text-2);
  line-height: 1.75;
}

/* ── A row ───────────────────────────────────────────────── */
#qa-answer {
  display: flex;
  align-items: flex-start;
  gap: 0.65rem;
}

#a-label {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  flex-shrink: 0;
  padding-top: 0.3em;
  min-width: 1.6rem;
  color: var(--accent);
  visibility: hidden;
}

#narrator-text {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 300;
  line-height: 1.8;
  color: var(--text);
  flex: 1;
}

/* ── Audio indicator ─────────────────────────────────────── */
#audio-indicator {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  min-height: 1.1rem;
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--text-2);
  transition: opacity 0.25s;
}
#audio-indicator.hidden { opacity: 0; pointer-events: none; }

.wave { display: flex; align-items: center; gap: 2px; }
.wave span {
  display: block; width: 2.5px; border-radius: 3px;
  background: var(--accent);
  animation: waveBounce 0.85s ease-in-out infinite;
}
.wave span:nth-child(1) { height: 5px;  animation-delay: 0.00s; }
.wave span:nth-child(2) { height: 11px; animation-delay: 0.12s; }
.wave span:nth-child(3) { height: 7px;  animation-delay: 0.24s; }
.wave span:nth-child(4) { height: 13px; animation-delay: 0.06s; }
.wave span:nth-child(5) { height: 6px;  animation-delay: 0.18s; }

@keyframes waveBounce {
  0%, 100% { transform: scaleY(1); }
  50%       { transform: scaleY(0.2); }
}

/* ── Choices ─────────────────────────────────────────────── */
#choices {
  padding: 1.5rem 2.25rem 2rem;
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
}
#choices-label {
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 0.2rem;
}

/* ── Choice buttons (base) ───────────────────────────────── */
.choice-btn {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.8rem 1.1rem;
  font-family: var(--font-ui);
  font-size: 0.93rem;
  font-weight: 400;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 0.65rem;
  transition: border-color 0.15s, background 0.15s, transform 0.1s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
}
.choice-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(110deg, transparent 0%, var(--accent-glow) 100%);
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}
.choice-btn:hover:not(:disabled)::after { opacity: 1; }
.choice-btn:hover:not(:disabled) {
  border-color: var(--accent-soft);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.choice-btn:active:not(:disabled) { transform: scale(0.99); }
.choice-btn::before {
  content: '›';
  font-size: 1.2rem;
  line-height: 1;
  color: var(--accent);
  flex-shrink: 0;
  transition: transform 0.15s;
}
.choice-btn:hover:not(:disabled)::before { transform: translateX(2px); }
.choice-btn:disabled { color: var(--disabled); cursor: not-allowed; background: var(--surface); }
.choice-btn:disabled::before { color: var(--text-3); }

/* visited forward choices — gold tint + checkmark */
.choice-btn.visited {
  background: var(--gold-soft);
  border-color: rgba(242,193,78,0.2);
  color: var(--text-2);
}
.choice-btn.visited::before {
  content: '✓';
  font-size: 0.85rem;
  color: var(--gold);
}
.choice-btn.visited:hover:not(:disabled) {
  border-color: rgba(242,193,78,0.45);
}
.choice-btn.visited::after {
  background: linear-gradient(110deg, transparent 0%, var(--gold-soft) 100%);
}

/* back buttons — muted style, no visited treatment */
.choice-btn.back-btn {
  background: transparent;
  border-color: var(--border);
  color: var(--text-3);
  font-size: 0.83rem;
}
.choice-btn.back-btn::before {
  content: '‹';
  color: var(--text-3);
}
.choice-btn.back-btn:hover:not(:disabled) {
  color: var(--text-2);
  border-color: var(--border-hi);
  transform: translateY(-1px);
}
.choice-btn.back-btn:hover:not(:disabled)::before {
  transform: translateX(-2px);
  color: var(--text-2);
}
.choice-btn.back-btn::after { display: none; }

/* ── Completion banner ───────────────────────────────────── */
#complete-banner {
  display: none;
  align-items: center;
  gap: 0.7rem;
  padding: 0.85rem 1.1rem;
  background: var(--green-soft);
  border: 1px solid rgba(74,222,128,0.25);
  border-radius: var(--radius-sm);
  font-size: 0.82rem;
  color: var(--green);
  font-weight: 500;
}
#complete-banner.visible { display: flex; }
#complete-banner .cb-icon { font-size: 1.1rem; flex-shrink: 0; }

/* ── Status / error ──────────────────────────────────────── */
#status {
  padding: 3.5rem 2rem;
  text-align: center;
  color: var(--text-2);
  font-size: 0.95rem;
}
#status .big { font-size: 2.2rem; margin-bottom: 0.75rem; }
#status p { font-style: italic; }
#status code {
  background: var(--surface-2);
  color: var(--accent);
  padding: 0.15em 0.45em;
  border-radius: 5px;
  font-style: normal;
  font-size: 0.85em;
}

@keyframes rise { to { opacity: 1; transform: translateY(0); } }
.fade-in { opacity: 0; animation: rise 0.3s ease forwards; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 4px; }

@media (max-width: 480px) {
  body { padding: 1rem 0.75rem; }
  #narrator, #choices { padding-left: 1.5rem; padding-right: 1.5rem; }
  #narrator-text { font-size: 1rem; }
  #splash { padding: 2.25rem 1.5rem; }
  #progress-widget { min-width: 90px; }
}
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="header-text">
      <h1 id="title-text">Virtual <em>Field Trip</em></h1>
      <div class="subtitle" id="subtitle-text">K12 Guide</div>
    </div>
    <div id="progress-widget">
      <div id="progress-label">Explored</div>
      <div id="progress-bar-track">
        <div id="progress-bar-fill"></div>
      </div>
      <div id="progress-pct">0%</div>
    </div>
  </div>
  <div id="book">
    <div id="status"><div class="big">📖</div><p>Loading…</p></div>
  </div>
</div>

<audio id="player"></audio>

<script>
/**
 * Virtual Field Trip Engine (Single File)
 * --------------------------------------
 * - Nodes = states in the trip
 * - Choices = transitions
 * - Audio = optional narration per node
 *
 * Rules:
 * - Forward choice → show Q/A + play audio
 * - Back choice → no Q/A, no audio
 *
 * Completion:
 * - When all nodes visited → show banner
 * - Thank-you audio plays AFTER current narration finishes
 */

// ─────────────────────────────────────
// State
// ─────────────────────────────────────
const state = {
  tripData: null,
  fileBase: '',
  currentNode: null,
  isPlaying: false,
  visitedNodes: new Set(),
  totalNodes: 0,
  tripComplete: false,
  pendingThankYou: false
};

// ─────────────────────────────────────
// DOM Cache
// ─────────────────────────────────────
const DOM = {
  player: document.getElementById('player'),
  book: document.getElementById('book'),
  progressFill: document.getElementById('progress-bar-fill'),
  progressPct: document.getElementById('progress-pct'),
  progressWidget: document.getElementById('progress-widget')
};

// ─────────────────────────────────────
// Audio Cache
// ─────────────────────────────────────
const audioCache = new Map();

function prefetchAudio(url) {
  if (audioCache.has(url)) return;

  const entry = { blob: null, objectUrl: null, state: 'loading' };
  audioCache.set(url, entry);

  fetch(url)
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.blob();
    })
    .then(blob => {
      entry.blob = blob;
      entry.objectUrl = URL.createObjectURL(blob);
      entry.state = 'ready';
    })
    .catch(() => entry.state = 'error');
}

function resolveAudioSrc(url) {
  const entry = audioCache.get(url);
  return (entry && entry.state === 'ready') ? entry.objectUrl : url;
}

// ─────────────────────────────────────
// Utilities
// ─────────────────────────────────────
function txt(str) {
  return document.createTextNode(String(str ?? ''));
}

// Prevent path traversal / external URLs
function sanitiseAudioPath(audioPath) {
  if (typeof audioPath !== 'string' || audioPath.trim() === '') return null;

  const colonIdx = audioPath.indexOf(':');
  const slashIdx = audioPath.indexOf('/');

  if (colonIdx !== -1 && (slashIdx === -1 || colonIdx < slashIdx)) return null;
  if (audioPath.includes('..')) return null;

  return audioPath;
}

function buildAudioUrl(path) {
  return state.fileBase + path;
}

// ─────────────────────────────────────
// Progress
// ─────────────────────────────────────
function computeTotalNodes() {
  return Object.keys(state.tripData.nodes).length;
}

function updateProgress() {
  const pct = state.totalNodes > 0
    ? Math.round((state.visitedNodes.size / state.totalNodes) * 100)
    : 0;

  DOM.progressFill.style.width = pct + '%';
  DOM.progressPct.textContent = pct + '%';

  if (pct >= 100 && !state.tripComplete) {
    state.tripComplete = true;

    DOM.progressFill.classList.add('complete');
    DOM.progressPct.classList.add('complete');
    DOM.book.classList.add('complete');

    showCompleteBanner();

    // Queue thank-you instead of interrupting
    state.pendingThankYou = true;
  }
}

function showCompleteBanner() {
  const banner = document.getElementById('complete-banner');
  if (banner) banner.classList.add('visible');
}

// ─────────────────────────────────────
// Audio
// ─────────────────────────────────────
function playAudioFile(src, canonicalUrl) {
  const player = DOM.player;

  player.pause();
  player.src = src;

  state.isPlaying = true;
  setWave(true);
  lockChoices(true);

  const done = () => {
    state.isPlaying = false;
    setWave(false);
    lockChoices(false);

    player.onended = null;
    player.onerror = null;

    // ✅ Play thank-you AFTER narration
    if (state.pendingThankYou) {
      state.pendingThankYou = false;
      setTimeout(playThankYouAudio, 400);
    }
  };

  player.onended = done;

  player.onerror = () => {
    if (src !== canonicalUrl) {
      player.src = canonicalUrl;
      player.play().catch(done);
    } else {
      done();
    }
  };

  player.play().catch(done);
}

function playThankYouAudio() {
  const path = state.tripData.thank_you;
  if (!path) return;

  const safe = sanitiseAudioPath(path);
  if (!safe) return;

  const url = buildAudioUrl(safe);
  prefetchAudio(url);

  playAudioFile(resolveAudioSrc(url), url);
}

// ─────────────────────────────────────
// Navigation
// ─────────────────────────────────────
function goTo(nodeId, playAudio = false, choiceText = null, isBack = false) {
  const node = state.tripData.nodes[nodeId];
  if (!node) return;

  state.visitedNodes.add(nodeId);
  state.currentNode = nodeId;

  renderNarrator(node, isBack ? null : choiceText);
  renderChoices(node);
  updateProgress();

  if (playAudio && node.audio) {
    const safe = sanitiseAudioPath(node.audio);
    if (safe) {
      const url = buildAudioUrl(safe);
      playAudioFile(resolveAudioSrc(url), url);
    }
  } else if (!node.audio && state.pendingThankYou) {
    // Handle no-audio edge case
    state.pendingThankYou = false;
    playThankYouAudio();
  }
}

function choiceClicked(choice) {
  if (state.isPlaying) return;

  const isBack = !!choice.back;
  goTo(choice.next, !isBack, choice.text, isBack);
}

// ─────────────────────────────────────
// UI Helpers
// ─────────────────────────────────────
function lockChoices(locked) {
  document.querySelectorAll('.choice-btn')
    .forEach(btn => btn.disabled = locked);
}

function setWave(visible) {
  const el = document.getElementById('audio-indicator');
  if (el) el.classList.toggle('hidden', !visible);
}

// ─────────────────────────────────────
// Init
// ─────────────────────────────────────
async function init() {
  const params = new URLSearchParams(location.search);
  const filePath = params.get('file');

  if (!filePath) return;

  const slashIdx = filePath.lastIndexOf('/');
  state.fileBase = '/' + (slashIdx >= 0 ? filePath.slice(0, slashIdx + 1) : '');

  const res = await fetch('/' + filePath);
  state.tripData = await res.json();

  state.totalNodes = computeTotalNodes();

  showSplash(state.tripData.root || 'Virtual Field Trip');
}

// ─────────────────────────────────────
// Splash
// ─────────────────────────────────────
function showSplash(titleText) {
  DOM.book.textContent = '';

  const splash = document.createElement('div');
  splash.id = 'splash';

  const btn = document.createElement('button');
  btn.id = 'start-btn';
  btn.textContent = 'Begin Trip →';

  btn.onclick = () => {
    DOM.progressWidget.style.display = 'flex';
    renderShell();
    goTo(state.tripData.start_node, true);
  };

  splash.appendChild(document.createTextNode(titleText));
  splash.appendChild(btn);
  DOM.book.appendChild(splash);
}

// ─────────────────────────────────────
// Boot
// ─────────────────────────────────────
init();
</script>
</body>
</html>
