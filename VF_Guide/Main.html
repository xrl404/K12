<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Field Trip</title>

  <!-- ─────────────────────────────────────────────────────────────────
       BEATRICE FONT FACES
       Expects font files at /fonts/Beatrice-*.otf
       ───────────────────────────────────────────────────────────────── -->
  <style>
    @font-face { font-family: 'Beatrice'; src: url('/fonts/Beatrice-Thin.otf') format('opentype'); font-weight: 100; font-style: normal; }
    @font-face { font-family: 'Beatrice'; src: url('/fonts/Beatrice-ThinItalic.otf') format('opentype'); font-weight: 100; font-style: italic; }
    @font-face { font-family: 'Beatrice'; src: url('/fonts/Beatrice-Light.otf') format('opentype'); font-weight: 300; font-style: normal; }
    @font-face { font-family: 'Beatrice'; src: url('/fonts/Beatrice-LightItalic.otf') format('opentype'); font-weight: 300; font-style: italic; }
    @font-face { font-family: 'Beatrice'; src: url('/fonts/Beatrice-Regular.otf') format('opentype'); font-weight: 400; font-style: normal; }
    @font-face { font-family: 'Beatrice'; src: url('/fonts/Beatrice-RegularItalic.otf') format('opentype'); font-weight: 400; font-style: italic; }
    @font-face { font-family: 'Beatrice'; src: url('/fonts/Beatrice-Medium.otf') format('opentype'); font-weight: 500; font-style: normal; }
    @font-face { font-family: 'Beatrice'; src: url('/fonts/Beatrice-MediumItalic.otf') format('opentype'); font-weight: 500; font-style: italic; }
    @font-face { font-family: 'Beatrice'; src: url('/fonts/Beatrice-SemiBold.otf') format('opentype'); font-weight: 600; font-style: normal; }
    @font-face { font-family: 'Beatrice'; src: url('/fonts/Beatrice-SemiBoldItalic.otf') format('opentype'); font-weight: 600; font-style: italic; }
    @font-face { font-family: 'Beatrice'; src: url('/fonts/Beatrice-Bold.otf') format('opentype'); font-weight: 700; font-style: normal; }
    @font-face { font-family: 'Beatrice'; src: url('/fonts/Beatrice-BoldItalic.otf') format('opentype'); font-weight: 700; font-style: italic; }
    @font-face { font-family: 'Beatrice'; src: url('/fonts/Beatrice-ExtraBold.otf') format('opentype'); font-weight: 800; font-style: normal; }
    @font-face { font-family: 'Beatrice'; src: url('/fonts/Beatrice-ExtraBoldItalic.otf') format('opentype'); font-weight: 800; font-style: italic; }
  </style>

  <style>
    /* ─────────────────────────────────────────────────────────────────
       DESIGN TOKENS
       Brand palette: #E8F6FC · #A2DEFF · #62C7FF · #0035F0 · #01308E
       ───────────────────────────────────────────────────────────────── */
    :root {
      /* Palette */
      --sky-pale:    #E8F6FC;
      --sky-light:   #A2DEFF;
      --sky-mid:     #62C7FF;
      --blue-vivid:  #0035F0;
      --blue-deep:   #01308E;

      /* Semantic surfaces */
      --bg:          var(--sky-pale);
      --surface:     #ffffff;
      --surface-2:   #f0f9ff;
      --border:      rgba(0, 53, 240, 0.10);
      --border-hi:   rgba(0, 53, 240, 0.22);

      /* Accent / interaction */
      --accent:      var(--blue-vivid);
      --accent-soft: rgba(0, 53, 240, 0.18);
      --accent-glow: rgba(98, 199, 255, 0.35);

      /* Success (completion) */
      --green:       #0a8a5e;
      --green-soft:  rgba(10, 138, 94, 0.10);
      --green-border:rgba(10, 138, 94, 0.28);

      /* Gold (visited) */
      --gold:        #0035F0;   /* reuse brand blue for visited accent */
      --gold-soft:   rgba(0, 53, 240, 0.07);

      /* Text */
      --text:        #01308E;
      --text-2:      #2552b0;
      --text-3:      #6e8eca;
      --text-muted:  #a0b4d6;
      --disabled:    #c5d8ef;

      /* Type */
      --font:        'Beatrice', system-ui, sans-serif;

      /* Shape */
      --radius:      16px;
      --radius-sm:   10px;
      --card-shadow: 0 0 0 1px var(--border), 0 8px 40px rgba(1, 48, 142, 0.10);
    }

    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ──────────────────────────────────────────────── */
    body {
      font-family: var(--font);
      font-weight: 400;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 50% at 5% 10%, rgba(162, 222, 255, 0.55) 0%, transparent 65%),
        radial-gradient(ellipse 55% 45% at 95% 90%, rgba(98, 199, 255, 0.30) 0%, transparent 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
    }

    #app { width: 100%; max-width: 640px; }

    /* ── Animations ────────────────────────────────────────── */
    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    @keyframes waveBounce {
      0%, 100% { transform: scaleY(1); }
      50%       { transform: scaleY(0.2); }
    }

    .fade-in {
      opacity: 0;
      animation: rise 0.30s ease forwards;
    }

    /* ─────────────────────────────────────────────────────────
       HEADER
       ───────────────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1.25rem;
      margin-bottom: 1.75rem;
      opacity: 0;
      transform: translateY(-10px);
      animation: rise 0.50s 0.08s ease forwards;
    }

    #header-text { text-align: left; flex: 1; }

    #header h1 {
      font-size: clamp(1.4rem, 4.5vw, 2.15rem);
      font-weight: 800;
      color: var(--blue-deep);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    #header h1 em {
      font-style: italic;
      font-weight: 300;
      color: var(--blue-vivid);
    }

    #header .subtitle {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-top: 0.4rem;
    }

    /* ── Progress widget ────────────────────────────────────── */
    #progress-widget {
      display: none;          /* shown via JS once the trip starts */
      flex-direction: column;
      align-items: flex-end;
      gap: 0.35rem;
      flex-shrink: 0;
      min-width: 110px;
    }

    #progress-label {
      font-size: 0.60rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    #progress-bar-track {
      width: 100%;
      height: 6px;
      background: rgba(0, 53, 240, 0.10);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    #progress-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--blue-vivid) 0%, var(--sky-mid) 100%);
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #progress-bar-fill.complete {
      background: linear-gradient(90deg, var(--green) 0%, #34d399 100%);
    }

    #progress-pct {
      font-size: 0.70rem;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0.04em;
      transition: color 0.4s;
    }

    #progress-pct.complete { color: var(--green); }

    /* ─────────────────────────────────────────────────────────
       BOOK CARD
       ───────────────────────────────────────────────────────── */
    #book {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      overflow: hidden;
      opacity: 0;
      transform: translateY(14px);
      animation: rise 0.55s 0.22s ease forwards;
      position: relative;
    }

    /* Top accent stripe */
    #book::before {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--sky-mid) 20%,
        var(--blue-vivid) 50%,
        var(--sky-mid) 80%,
        transparent 100%);
      border-radius: var(--radius) var(--radius) 0 0;
      transition: background 0.6s ease;
    }

    #book.complete::before {
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(10, 138, 94, 0.45) 20%,
        var(--green) 50%,
        rgba(10, 138, 94, 0.45) 80%,
        transparent 100%);
    }

    /* ─────────────────────────────────────────────────────────
       SPLASH SCREEN
       ───────────────────────────────────────────────────────── */
    #splash {
      padding: 3rem 2.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      text-align: center;
    }

    #splash-icon { font-size: 3rem; line-height: 1; }

    #splash-title {
      font-size: 1.3rem;
      font-weight: 300;
      color: var(--blue-deep);
      line-height: 1.6;
    }

    #splash-hint {
      font-size: 0.82rem;
      color: var(--text-3);
      max-width: 320px;
    }

    #start-btn {
      background: var(--blue-vivid);
      color: #ffffff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.85rem 2.5rem;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(0, 53, 240, 0.30);
    }

    #start-btn:hover  { opacity: 0.90; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0, 53, 240, 0.40); }
    #start-btn:active { transform: scale(0.98); }

    /* ─────────────────────────────────────────────────────────
       NARRATOR PANEL
       ───────────────────────────────────────────────────────── */
    #narrator {
      padding: 2rem 2.25rem 1.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    #narrator-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: rgba(0, 53, 240, 0.45);
    }

    /* ── Q row ─────────────────────────────────────────────── */
    #qa-question {
      display: none;          /* shown when a forward choice is made */
      align-items: flex-start;
      gap: 0.65rem;
      padding-bottom: 0.85rem;
      border-bottom: 1px solid var(--border);
    }

    #qa-question.visible { display: flex; }

    .qa-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      flex-shrink: 0;
      padding-top: 0.3em;
      min-width: 1.6rem;
    }

    .qa-label.q { color: var(--sky-mid); }
    .qa-label.a { color: var(--blue-vivid); }

    #qa-question-text {
      font-size: 0.95rem;
      font-weight: 300;
      font-style: italic;
      color: var(--text-3);
      line-height: 1.75;
    }

    /* ── A row ─────────────────────────────────────────────── */
    #qa-answer {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
    }

    #a-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      flex-shrink: 0;
      padding-top: 0.3em;
      min-width: 1.6rem;
      color: var(--blue-vivid);
      visibility: hidden;
    }

    #narrator-text {
      font-size: 1.10rem;
      font-weight: 300;
      line-height: 1.85;
      color: var(--blue-deep);
      flex: 1;
    }

    /* ── Audio indicator ────────────────────────────────────── */
    #audio-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-height: 1.1rem;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-3);
      transition: opacity 0.25s;
    }

    #audio-indicator.hidden { opacity: 0; pointer-events: none; }

    .wave { display: flex; align-items: center; gap: 2px; }

    .wave span {
      display: block;
      width: 2.5px;
      border-radius: 3px;
      background: var(--blue-vivid);
      animation: waveBounce 0.85s ease-in-out infinite;
    }

    .wave span:nth-child(1) { height: 5px;  animation-delay: 0.00s; }
    .wave span:nth-child(2) { height: 11px; animation-delay: 0.12s; }
    .wave span:nth-child(3) { height: 7px;  animation-delay: 0.24s; }
    .wave span:nth-child(4) { height: 13px; animation-delay: 0.06s; }
    .wave span:nth-child(5) { height: 6px;  animation-delay: 0.18s; }

    /* ─────────────────────────────────────────────────────────
       CHOICES PANEL
       ───────────────────────────────────────────────────────── */
    #choices {
      padding: 1.5rem 2.25rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    #choices-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.2rem;
    }

    /* ── Choice button — base ──────────────────────────────── */
    .choice-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.8rem 1.1rem;
      font-family: var(--font);
      font-size: 0.93rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      transition: border-color 0.15s, background 0.15s, transform 0.10s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }

    /* Hover shimmer overlay */
    .choice-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 0%, var(--accent-glow) 100%);
      opacity: 0;
      transition: opacity 0.20s;
      pointer-events: none;
    }

    .choice-btn:hover:not(:disabled)::after  { opacity: 1; }

    .choice-btn:hover:not(:disabled) {
      border-color: var(--border-hi);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(1, 48, 142, 0.12);
    }

    .choice-btn:active:not(:disabled) { transform: scale(0.99); }

    /* Leading arrow */
    .choice-btn::before {
      content: '›';
      font-size: 1.2rem;
      line-height: 1;
      color: var(--blue-vivid);
      flex-shrink: 0;
      transition: transform 0.15s;
    }

    .choice-btn:hover:not(:disabled)::before { transform: translateX(2px); }

    .choice-btn:disabled {
      color: var(--disabled);
      cursor: not-allowed;
      background: var(--surface);
    }

    .choice-btn:disabled::before { color: var(--disabled); }

    /* ── Visited forward choices ────────────────────────────── */
    .choice-btn.visited {
      background: var(--gold-soft);
      border-color: rgba(0, 53, 240, 0.15);
      color: var(--text-2);
    }

    .choice-btn.visited::before {
      content: '✓';
      font-size: 0.85rem;
      color: var(--blue-vivid);
    }

    /* ── Back buttons ───────────────────────────────────────── */
    .choice-btn.back-btn {
      background: transparent;
      border-color: var(--border);
      color: var(--text-3);
      font-size: 0.84rem;
      font-weight: 400;
    }

    .choice-btn.back-btn::before {
      content: '‹';
      color: var(--text-3);
    }

    .choice-btn.back-btn:hover:not(:disabled) {
      color: var(--text-2);
      border-color: var(--border-hi);
      transform: translateY(-1px);
    }

    .choice-btn.back-btn:hover:not(:disabled)::before {
      transform: translateX(-2px);
      color: var(--text-2);
    }

    /* Suppress shimmer on back buttons */
    .choice-btn.back-btn::after { display: none; }

    /* ── Completion banner ──────────────────────────────────── */
    #complete-banner {
      display: none;
      align-items: center;
      gap: 0.7rem;
      padding: 0.85rem 1.1rem;
      background: var(--green-soft);
      border: 1px solid var(--green-border);
      border-radius: var(--radius-sm);
      font-size: 0.82rem;
      color: var(--green);
      font-weight: 600;
    }

    #complete-banner.visible { display: flex; }
    #complete-banner .cb-icon { font-size: 1.1rem; flex-shrink: 0; }

    /* ─────────────────────────────────────────────────────────
       STATUS / ERROR SCREEN
       ───────────────────────────────────────────────────────── */
    #status {
      padding: 3.5rem 2rem;
      text-align: center;
      color: var(--text-2);
      font-size: 0.95rem;
    }

    #status .big { font-size: 2.2rem; margin-bottom: 0.75rem; }
    #status p    { font-style: italic; }

    #status code {
      background: var(--surface-2);
      color: var(--blue-vivid);
      padding: 0.15em 0.45em;
      border-radius: 5px;
      font-style: normal;
      font-size: 0.85em;
    }

    /* ── Scrollbar ──────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 4px; }

    /* ── Mobile adjustments ─────────────────────────────────── */
    @media (max-width: 480px) {
      body { padding: 1rem 0.75rem; }
      #narrator, #choices { padding-left: 1.5rem; padding-right: 1.5rem; }
      #narrator-text { font-size: 1rem; }
      #splash { padding: 2.25rem 1.5rem; }
      #progress-widget { min-width: 90px; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- Header: title + progress widget -->
  <div id="header">
    <div id="header-text">
      <h1 id="title-text">Virtual <em>Field Trip</em></h1>
      <div class="subtitle" id="subtitle-text">K12 Guide</div>
    </div>
    <div id="progress-widget">
      <div id="progress-label">Explored</div>
      <div id="progress-bar-track">
        <div id="progress-bar-fill"></div>
      </div>
      <div id="progress-pct">0%</div>
    </div>
  </div>

  <!-- Main card — content rendered here by JS -->
  <div id="book">
    <div id="status"><div class="big">📖</div><p>Loading…</p></div>
  </div>

</div>

<!-- Hidden audio player -->
<audio id="player"></audio>

<script>
/* =============================================================
   VIRTUAL FIELD TRIP — player script
   -------------------------------------------------------------
   DATA SCHEMA (*.VFJF, a JSON file):
     {
       "root": "Trip Title",
       "start_node": "node_id",
       "thank_you": "audio/thankyou.mp3",   // optional
       "nodes": {
         "node_id": {
           "text":    "Narrator text shown in the card.",
           "audio":   "audio/node.mp3",      // optional
           "choices": [
             { "text": "Choice label", "next": "other_node_id" },
             { "text": "← Go back",   "next": "prev_node_id", "back": true }
           ]
         }
       }
     }

   URL FORMAT:
     ?file=Virtual_Fieldtrips/TripName/TripName.VFJF
   ============================================================= */

  // ── State ──────────────────────────────────────────────────
  let data         = null;   // parsed JSON from the .VFJF file
  let fileBase     = '';     // root path for resolving audio URLs
  let currentNode  = null;   // currently displayed node id
  let isPlaying    = false;  // true while narration audio is playing
  let visitedNodes = new Set();  // set of node ids the user has visited
  let totalNodes   = 0;
  let tripComplete = false;

  // Queue for the thank-you audio: play after current narration ends
  let pendingThankYou = null;  // URL string, or null

  const player = document.getElementById('player');

  // ── Audio cache ─────────────────────────────────────────────
  // Pre-fetches audio files into Blob URLs to avoid network delays
  // between pressing a choice and audio starting.
  const audioCache = new Map();

  function prefetchAudio(url) {
    if (audioCache.has(url)) return;
    const entry = { blob: null, objectUrl: null, state: 'loading' };
    audioCache.set(url, entry);
    fetch(url)
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.blob();
      })
      .then(blob => {
        entry.blob      = blob;
        entry.objectUrl = URL.createObjectURL(blob);
        entry.state     = 'ready';
      })
      .catch(err => {
        console.warn('Audio prefetch failed:', url, err);
        entry.state = 'error';
      });
  }

  // Pre-fetch audio for all forward children of a node
  function prefetchNodeAudio(nodeId) {
    const node = data.nodes[nodeId];
    if (!node || !node.choices) return;
    node.choices.forEach(choice => {
      if (choice.back) return;
      const next = data.nodes[choice.next];
      if (!next || !next.audio) return;
      const safePath = sanitiseAudioPath(next.audio);
      if (!safePath) return;
      prefetchAudio(buildAudioUrl(safePath));
    });
  }

  // Return a cached Blob URL if available, otherwise fall back to the
  // network URL (the player will handle fallback on error too).
  function resolveAudioSrc(url) {
    const entry = audioCache.get(url);
    if (entry && entry.state === 'ready' && entry.objectUrl) return entry.objectUrl;
    return url;
  }

  // ── Path helpers ────────────────────────────────────────────

  // Reject paths that look like absolute URLs or path-traversal attempts.
  function sanitiseAudioPath(audioPath) {
    if (typeof audioPath !== 'string' || audioPath.trim() === '') return null;
    const colonIdx = audioPath.indexOf(':');
    const slashIdx = audioPath.indexOf('/');
    if (colonIdx !== -1 && (slashIdx === -1 || colonIdx < slashIdx)) return null;
    if (audioPath.includes('..')) return null;
    return audioPath;
  }

  function buildAudioUrl(audioPath) {
    return fileBase + audioPath;
  }

  // ── Progress ────────────────────────────────────────────────

  function updateProgress() {
    const pct   = totalNodes > 0 ? Math.round((visitedNodes.size / totalNodes) * 100) : 0;
    const fill  = document.getElementById('progress-bar-fill');
    const pctEl = document.getElementById('progress-pct');
    if (!fill || !pctEl) return;

    fill.style.width  = pct + '%';
    pctEl.textContent = pct + '%';

    if (pct >= 100 && !tripComplete) {
      tripComplete = true;
      fill.classList.add('complete');
      pctEl.classList.add('complete');
      document.getElementById('book').classList.add('complete');
      showCompleteBanner();
      scheduleThankYouAudio();
    }
  }

  function showCompleteBanner() {
    const banner = document.getElementById('complete-banner');
    if (banner) banner.classList.add('visible');
  }

  // Queue the thank-you audio so it plays AFTER the current narration
  // finishes rather than interrupting it.
  function scheduleThankYouAudio() {
    if (!data.thank_you) return;
    const safePath = sanitiseAudioPath(data.thank_you);
    if (!safePath) return;
    const url = buildAudioUrl(safePath);
    prefetchAudio(url);
    pendingThankYou = url;

    // If nothing is playing right now, fire immediately.
    if (!isPlaying) {
      flushPendingThankYou();
    }
    // Otherwise, playAudioFile's `done` callback will call flushPendingThankYou.
  }

  function flushPendingThankYou() {
    if (!pendingThankYou) return;
    const url = pendingThankYou;
    pendingThankYou = null;
    playAudioFile(resolveAudioSrc(url), url);
  }

  // ── Initialisation ──────────────────────────────────────────

  async function init() {
    const params   = new URLSearchParams(location.search);
    const filePath = params.get('file');

    if (!filePath) {
      showError('⚠️', 'No file specified.',
        'Add ?file=Virtual_Fieldtrips/TripName/TripName.VFJF to the URL.');
      return;
    }

    // Derive the base directory so relative audio paths resolve correctly.
    const slashIdx = filePath.lastIndexOf('/');
    fileBase       = '/' + (slashIdx >= 0 ? filePath.slice(0, slashIdx + 1) : '');

    try {
      const res = await fetch('/' + filePath);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      data = await res.json();
    } catch (e) {
      showError('⚠️', 'Could not load trip file.', e.message, filePath);
      return;
    }

    if (!data.nodes || !data.start_node || !data.nodes[data.start_node]) {
      showError('⚠️', 'Invalid trip file.', 'Missing nodes or start_node.');
      return;
    }

    totalNodes = Object.keys(data.nodes).length;

    // Set page / header title
    const tripTitle = String(data.root || 'Virtual Field Trip').trim();
    document.title  = tripTitle;
    setHeaderTitle(tripTitle);

    // Pre-fetch start node audio and thank-you audio early
    const startNode = data.nodes[data.start_node];
    if (startNode && startNode.audio) {
      const safePath = sanitiseAudioPath(startNode.audio);
      if (safePath) prefetchAudio(buildAudioUrl(safePath));
    }
    if (data.thank_you) {
      const safePath = sanitiseAudioPath(data.thank_you);
      if (safePath) prefetchAudio(buildAudioUrl(safePath));
    }

    showSplash(tripTitle, !!(startNode && startNode.audio));
  }

  // Update the h1 so the last word is wrapped in <em> for italic styling.
  function setHeaderTitle(tripTitle) {
    const h1   = document.getElementById('title-text');
    const words = tripTitle.split(' ');
    h1.textContent = '';
    if (words.length > 1) {
      h1.appendChild(document.createTextNode(words.slice(0, -1).join(' ') + ' '));
    }
    const em = document.createElement('em');
    em.textContent = words[words.length - 1];
    h1.appendChild(em);
  }

  // ── Splash screen ───────────────────────────────────────────

  function showSplash(tripTitle, hasAudio) {
    const book = document.getElementById('book');
    book.textContent = '';

    const splash = el('div', { id: 'splash' });
    splash.appendChild(el('div', { id: 'splash-icon', text: '🌍' }));
    splash.appendChild(el('div', { id: 'splash-title', text: tripTitle }));
    splash.appendChild(el('p', {
      id: 'splash-hint',
      text: hasAudio
        ? 'Audio narration is included — make sure your sound is on.'
        : 'Use the choices below to explore each stop on the trip.',
    }));

    const btn = el('button', { id: 'start-btn', text: 'Begin Trip →' });
    btn.addEventListener('click', () => {
      document.getElementById('progress-widget').style.display = 'flex';
      renderShell();
      goTo(data.start_node, /* playAudio */ true, /* choiceText */ null, /* isBack */ false);
    });
    splash.appendChild(btn);

    book.appendChild(splash);
  }

  // ── Shell (narrator + choices panels) ──────────────────────

  function renderShell() {
    const book = document.getElementById('book');
    book.textContent = '';

    // ── Narrator panel ──
    const narrator = el('div', { id: 'narrator' });
    narrator.appendChild(el('div', { id: 'narrator-label', text: 'Narrator' }));

    // Q row (question echoed when a choice is made)
    const qaQuestion = el('div', { id: 'qa-question' });
    qaQuestion.appendChild(el('span', { className: 'qa-label q', text: 'Q:' }));
    qaQuestion.appendChild(el('span', { id: 'qa-question-text' }));
    narrator.appendChild(qaQuestion);

    // A row (narrator response)
    const qaAnswer = el('div', { id: 'qa-answer' });
    qaAnswer.appendChild(el('span', { id: 'a-label', text: 'A:' }));
    qaAnswer.appendChild(el('span', { id: 'narrator-text' }));
    narrator.appendChild(qaAnswer);

    // Animated audio indicator
    const audioIndicator = el('div', { id: 'audio-indicator', className: 'hidden' });
    const wave = el('div', { className: 'wave' });
    for (let i = 0; i < 5; i++) wave.appendChild(el('span'));
    audioIndicator.appendChild(wave);
    audioIndicator.appendChild(document.createTextNode('Playing…'));
    narrator.appendChild(audioIndicator);

    book.appendChild(narrator);

    // ── Choices panel ──
    const choices = el('div', { id: 'choices' });
    choices.appendChild(el('div', { id: 'choices-label', text: 'Your response' }));

    // Completion banner (hidden until full exploration)
    const banner = el('div', { id: 'complete-banner' });
    const cbIcon = el('span', { className: 'cb-icon', text: '🎉' });
    banner.appendChild(cbIcon);
    banner.appendChild(document.createTextNode("You've explored the entire trip — great work!"));
    choices.appendChild(banner);

    book.appendChild(choices);
  }

  // ── Navigation ──────────────────────────────────────────────
  // isBack = true  → navigate backwards: no audio, Q: label hidden
  // isBack = false → navigate forwards:  play audio, show Q: label

  function goTo(nodeId, playAudio, choiceText, isBack) {
    const node = data.nodes[nodeId];
    if (!node) { console.warn('Unknown node:', nodeId); return; }

    visitedNodes.add(nodeId);
    currentNode = nodeId;

    renderNarrator(node, isBack ? null : choiceText);
    renderChoices(node);
    updateProgress();
    prefetchNodeAudio(nodeId);

    if (playAudio && node.audio) {
      const safePath = sanitiseAudioPath(node.audio);
      if (safePath) {
        const url = buildAudioUrl(safePath);
        playAudioFile(resolveAudioSrc(url), url);
      } else {
        console.warn('Rejected unsafe audio path:', node.audio);
      }
    }
  }

  function choiceClicked(choice) {
    if (isPlaying) return;
    const isBack = !!choice.back;
    goTo(choice.next, /* playAudio */ !isBack, choice.text, isBack);
  }

  // ── Audio playback ──────────────────────────────────────────

  function playAudioFile(src, canonicalUrl) {
    player.pause();
    player.src = src;
    isPlaying  = true;
    setWave(true);
    lockChoices(true);

    const done = () => {
      isPlaying = false;
      setWave(false);
      lockChoices(false);
      player.onended = null;
      player.onerror = null;

      // If a thank-you clip is waiting, play it now that narration is done.
      if (pendingThankYou) {
        flushPendingThankYou();
      }
    };

    player.onended = done;
    player.onerror = (e) => {
      // One retry using the canonical (non-cached) URL
      if (src !== canonicalUrl) {
        player.src = canonicalUrl;
        player.play().catch(err => { console.warn('Audio retry failed:', err); done(); });
      } else {
        console.warn('Audio error:', src, e);
        done();
      }
    };

    player.play().catch(e => { console.warn('play() rejected:', e); done(); });
  }

  // ── Rendering helpers ───────────────────────────────────────

  function renderNarrator(node, choiceText) {
    const qaQuestion = document.getElementById('qa-question');
    const qText      = document.getElementById('qa-question-text');
    const aLabel     = document.getElementById('a-label');

    if (choiceText) {
      qText.textContent = choiceText;
      qaQuestion.classList.add('visible');
      aLabel.style.visibility = 'visible';
    } else {
      qText.textContent = '';
      qaQuestion.classList.remove('visible');
      aLabel.style.visibility = 'hidden';
    }

    const narratorText = document.getElementById('narrator-text');
    // Restart fade-in animation by forcing a reflow
    narratorText.style.animation = 'none';
    void narratorText.offsetHeight;
    narratorText.style.animation = '';
    narratorText.classList.add('fade-in');
    narratorText.textContent = node.text || '';
  }

  function renderChoices(node) {
    const container = document.getElementById('choices');
    const label     = document.getElementById('choices-label');
    const banner    = document.getElementById('complete-banner');

    // Remove old choice buttons (keep label and banner)
    Array.from(container.children).forEach(child => {
      if (child !== label && child !== banner) child.remove();
    });

    const choices       = node.choices || [];
    const forwardChoices = choices.filter(c => !c.back);
    const backChoices    = choices.filter(c =>  c.back);

    if (choices.length === 0) {
      const end = document.createElement('p');
      end.style.cssText = 'color:var(--text-muted);font-size:0.85rem;font-style:italic;margin-top:0.5rem;';
      end.textContent = '— End of trip —';
      container.insertBefore(end, banner);
      return;
    }

    forwardChoices.forEach(choice => {
      const btn = el('button', { className: 'choice-btn fade-in', text: choice.text });
      if (visitedNodes.has(choice.next)) btn.classList.add('visited');
      btn.addEventListener('click', () => choiceClicked(choice));
      container.insertBefore(btn, banner);
    });

    backChoices.forEach(choice => {
      const btn = el('button', { className: 'choice-btn back-btn fade-in', text: choice.text });
      btn.addEventListener('click', () => choiceClicked(choice));
      container.insertBefore(btn, banner);
    });
  }

  function lockChoices(locked) {
    document.querySelectorAll('.choice-btn').forEach(btn => { btn.disabled = locked; });
  }

  function setWave(visible) {
    const el = document.getElementById('audio-indicator');
    if (el) el.classList.toggle('hidden', !visible);
  }

  // ── Error screen ────────────────────────────────────────────

  function showError(icon, headline, detail, file) {
    const book = document.getElementById('book');
    book.textContent = '';

    const status = el('div', { id: 'status' });
    status.appendChild(el('div', { className: 'big', text: icon }));
    status.appendChild(el('p', { text: headline }));

    if (file) {
      const pFile = el('p');
      pFile.style.cssText = 'margin-top:0.5rem;font-size:0.85rem;';
      pFile.appendChild(document.createTextNode('File: '));
      const code = el('code', { text: file });
      pFile.appendChild(code);
      status.appendChild(pFile);
    }

    if (detail) {
      const p2 = el('p', { text: detail });
      p2.style.cssText = 'margin-top:0.35rem;font-size:0.85rem;';
      status.appendChild(p2);
    }

    book.appendChild(status);
  }

  // ── DOM utility ─────────────────────────────────────────────
  // Lightweight helper: el(tag, { id, className, text }) → HTMLElement

  function el(tag, opts = {}) {
    const node = document.createElement(tag);
    if (opts.id)        node.id           = opts.id;
    if (opts.className) node.className     = opts.className;
    if (opts.text)      node.textContent   = opts.text;
    return node;
  }

  // ── Bootstrap ───────────────────────────────────────────────
  init();
</script>
</body>
</html>
