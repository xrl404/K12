<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue-100:#E8F6FC;--blue-300:#A2DEFF;--blue-400:#62C7FF;--blue-500:#0035F0;--blue-700:#01308E;
  --yellow-400:#FFEA2F;--green-300:#8EE68C;--red-300:#FD6F6B;--red-400:#D81B43;--red-600:#8C0C0B;
  --orange-100:#FFECE6;--orange-400:#FD762B;--orange-600:#C24F07;--green-100:#E6F0EF;--green-400:#4ADC51;
  --green-600:#004C2C;--yellow-100:#FFF0E5;--yellow-500:#FFCC00;--cyan-200:#C9F9FE;--white:#FFFFFF;
  --purple-400:#F380FC;--purple-500:#A40BCF;--purple-600:#9F1F77;--black-300:#3A3A3A;--black-600:#141414;
  --color-primary:var(--blue-700);--color-secondary:var(--blue-300);--color-accent-1:var(--blue-500);
  --color-accent-2:var(--purple-500);--color-accent-3:var(--yellow-500);--color-accent-4:var(--green-400);
  --color-bg:var(--white);--color-bg-alt:var(--blue-100);--color-text:var(--black-300);
}
body{
  font-family:
    Inter,
    system-ui,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;
}
#app{
  display:flex;
  flex-direction:column;
  height:650px;
  background:var(--color-bg);
  border-radius:20px;
  overflow:hidden;
  border:2px solid var(--blue-300);
}

#chat-header{
  background:linear-gradient(
    135deg,
    var(--blue-700),
    var(--blue-500)
  );
  padding:18px 20px;
  display:flex;
  align-items:center;
  gap:12px;
}

#chat-header .avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  background:var(--blue-300);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

#chat-header .avatar i{
  font-size:20px;
  color:var(--blue-700);
}

#chat-header .title{
  font-size:16px;
  font-weight:600;
  color:var(--white);
}

#chat-header .subtitle{
  font-size:12px;
  color:var(--blue-100);
}

#chat-area{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:14px;
  background:var(--blue-100);
}

.bubble{
  max-width:82%;
  padding:14px 16px;
  font-size:14px;
  line-height:1.7;
}

.bubble.bot{
  background:var(--white);
  color:var(--color-text);
  border:1px solid var(--blue-300);
  border-radius:18px 18px 18px 6px;
  align-self:flex-start;
}

.bubble.user{
  background:linear-gradient(
    135deg,
    var(--blue-700),
    var(--blue-500)
  );
  color:var(--white);
  border-radius:18px 18px 6px 18px;
  align-self:flex-end;
}

.result-item{
  background:var(--white);
  border:1px solid var(--blue-300);
  border-radius:12px;
  padding:10px 14px;
  cursor:pointer;
  font-size:13px;
  transition:.15s;
}

.result-item:hover{
  background:var(--blue-100);
  border-color:var(--blue-500);
}

.chip{
  background:var(--white);
  border:1px solid var(--blue-400);
  border-radius:999px;
  padding:8px 14px;
  font-size:12px;
  cursor:pointer;
  color:var(--blue-700);
  transition:.15s;
}

.chip:hover{
  background:var(--blue-500);
  color:var(--white);
  border-color:var(--blue-500);
}

#input-wrap{
  padding:14px;
  border-top:2px solid var(--blue-300);
  background:var(--white);
}

#input-row{
  display:flex;
  gap:10px;
}

#input-row input{
  flex:1;
  border:2px solid var(--blue-300);
  border-radius:14px;
  padding:12px 14px;
  font-size:14px;
  background:var(--blue-100);
  color:var(--color-text);
  outline:none;
  transition:.15s;
}

#input-row input:focus{
  border-color:var(--blue-500);
  background:var(--white);
}

#send-btn{
  width:48px;
  height:48px;
  flex-shrink:0;
  border:none;
  border-radius:14px;
  background:linear-gradient(
    135deg,
    var(--blue-700),
    var(--blue-500)
  );
  color:var(--white);
  cursor:pointer;
  font-size:16px;
  transition:.15s;
}

#send-btn:hover{
  background:linear-gradient(
    135deg,
    var(--blue-500),
    var(--blue-700)
  );
}

#suggest-box{
  background:var(--white);
  border:1px solid var(--blue-300);
  border-radius:12px;
  margin-bottom:8px;
  overflow:hidden;
}

.suggest-item{
  padding:10px 12px;
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
}

.suggest-item:hover,
.suggest-item.active{
  background:var(--blue-100);
}

.suggest-q{
  flex:1;
}

.fuzzy-badge{
  font-size:10px;
  background:var(--blue-100);
  color:var(--blue-700);
  border-radius:999px;
  padding:2px 8px;
  margin-left:6px;
}

.section-label,.popular-label{
  font-size:11px;
  font-weight:600;
  color:var(--blue-700);
  margin:12px 0 6px;
  text-transform:uppercase;
  letter-spacing:.04em;
}

.followup-chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.result-list{
  list-style:none;
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:8px;
}

.source-link{
  display:inline-block;
  margin-top:10px;
  font-size:12px;
}

.source-link a{
  color:var(--blue-500);
  text-decoration:none;
}

.source-link a:hover{
  text-decoration:underline;
}

.no-answer-msg{
  font-size:13px;
  line-height:1.6;
  margin-bottom:4px;
}

.no-answer-msg a{
  color:var(--blue-500);
}
</style>

<h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">K12 NPC help chatbot with live question suggestions as you type.</h2>

<div id="app">
  <div id="chat-header">
    <div class="avatar"><i class="ti ti-school" aria-hidden="true"></i></div>
    <div>
      <div class="title">K12 Help Guide</div>
      <div class="subtitle">Ask me anything about virtual school</div>
    </div>
  </div>
  <div id="chat-area"></div>
  <div id="input-wrap">
    <div id="suggest-box"></div>
    <div id="input-row">
      <input type="text" id="query" placeholder="Ask a question or search a topic…" autocomplete="off" />
      <button id="send-btn" aria-label="Send"><i class="ti ti-arrow-right" aria-hidden="true"></i></button>
    </div>
  </div>
</div>

<script>
// npc ids to name 1. strider 2. coach brave 3. dash
const ALL_DATA=[
  {npc:1,q:"What courses are available at my virtual academy?",a:"There are lots of courses to explore! K12-powered schools offer core classes like math, science, English, and history, plus electives and career-focused classes depending on your grade level and school. Your exact course options may depend on your academy and grade.",src:"https://www.k12.com/faq/results/?faq-category=how-online-learning-works",fqs:[{q:"Can I take advanced classes?",a:"Absolutely! Many K12-powered schools offer Honors and Advanced Placement (AP®) classes for students who want an extra challenge."},{q:"Are there elective classes?",a:"Yes! Many schools offer electives like art, music, coding, business, world languages, and career exploration courses."},{q:"Can high school students prepare for careers?",a:"They can! Some schools offer career pathways and career-prep programs that help students explore future jobs and learn real-world skills."}]},
  {npc:1,q:"What is the Flex Program?",a:"The Flex Program gives students more control over their schedule while still getting support from teachers. Students can often complete lessons at their own pace while checking in regularly with teachers for guidance. It's designed for families who need extra flexibility.",src:"https://www.k12.com/how-online-learning-works/online-flex-program/",fqs:[{q:"Do Flex students still have teachers?",a:"Yes! Flex students still work with certified teachers who provide support, answer questions, and help students stay on track."},{q:"Do Flex students attend live classes?",a:"Sometimes! Live sessions may be optional depending on the program, and students can attend when they need extra help or instruction."},{q:"Can students leave the Flex Program later?",a:"Yes. Many Flex programs allow students to return to a more traditional online schedule if needed."}]},
  {npc:1,q:"What is the role of a Learning Coach?",a:"A Learning Coach is usually a parent or another trusted adult who helps support the student during online learning. They help students stay organized, keep track of assignments, and build strong learning habits. Teachers still provide instruction, grading, and academic support.",src:"https://www.k12.com/faq/results/?faq-category=how-online-learning-works",fqs:[{q:"Do high school students still need a Learning Coach?",a:"Yes, but the role changes as students get older. High school students are expected to be more independent while Learning Coaches provide encouragement and oversight."},{q:"Does the Learning Coach teach the lessons?",a:"No. Teachers handle instruction, grading, and feedback while Learning Coaches help students stay on schedule."},{q:"How much time does a Learning Coach spend helping?",a:"It depends on grade level. Younger students usually need more support, while older students often work more independently."}]},
  {npc:1,q:"How can the Learning Coach best support their virtual student?",a:"Learning Coaches can help students create routines, stay organized, and manage their time effectively. They can encourage students when learning feels challenging and celebrate progress along the way. Think of them as an important member of your success team!",src:"https://www.k12.com/faq/results/?faq-category=how-online-learning-works",fqs:[{q:"What if I need help with assignments?",a:"You can ask both your teacher and your Learning Coach for support."},{q:"Can Learning Coaches contact teachers?",a:"Yes! Learning Coaches often work closely with teachers to help students succeed."}]},
  {npc:1,q:"How have K12-powered virtual schools helped students thrive?",a:"K12-powered schools give students flexibility, personalized learning opportunities, and access to certified teachers. Many students thrive because they can learn at a pace that works for them while receiving academic support. Families also appreciate having more control over the learning environment.",src:"https://www.k12.com/faq/results/?faq-category=how-online-learning-works",fqs:[{q:"Do students learn differently online?",a:"Yes. Online learning allows students to move at a pace that fits their needs and learning style."},{q:"Can students get extra help if they need it?",a:"Absolutely! Teachers provide support through live classes, office hours, messages, and academic resources."}]},
  {npc:1,q:"How can I socialize at K12-powered schools?",a:"There are lots of ways to meet other students! K12-powered schools offer clubs, virtual activities, contests, field trips, school events, and other social opportunities where students can connect and make friends.",src:"https://www.k12.com/faq/results/?faq-category=how-online-learning-works",fqs:[{q:"Are online students less social?",a:"Not at all! Online students can still participate in clubs, activities, events, and community opportunities."},{q:"Can students join clubs?",a:"Yes! Many schools offer clubs focused on art, gaming, leadership, science, music, and more."},{q:"Are there field trips and school events?",a:"There can be! Many schools organize field trips, dances, graduations, and community events."}]},
  {npc:1,q:"How can I socialize through the K12 Zone?",a:"The K12 Zone is a great place to meet other students in a safe, moderated environment. You can participate in games, events, clubs, activities, challenges, and conversations with students from across the country.",src:"https://www.k12.com/k12-zone/",fqs:[{q:"Can I chat with other students?",a:"Yes! The K12 Zone includes moderated chat features designed to help students connect safely."},{q:"What kind of events are held in the K12 Zone?",a:"The K12 Zone hosts many events, like talent shows, movie-nights, conventions, and award ceremonies!"}]},
  {npc:1,q:"How does K12 support mental health?",a:"K12-powered schools work to create safe, supportive learning environments where students can succeed. Schools may offer counselors, student support services, and resources that promote student well-being.",src:"https://www.k12.com/faq/results/",fqs:[{q:"How can I talk to a school counselor?",a:"Reach out to your teacher or school administration. Schools have counselors available to support students academically and personally."},{q:"What if I'm feeling stressed?",a:"Talk with a trusted adult, teacher, counselor, or family member. You're never expected to handle challenges alone."},{q:"Does K12 focus on student well-being?",a:"Yes! Supporting student success includes supporting emotional well-being and school engagement."}]},
  {npc:1,q:"How much time will I spend online?",a:"Online learning schedules vary by grade level and school. Students typically spend several hours each day completing lessons, attending live classes, and working on assignments.",src:"https://www.help.k12.com/s/article/K12-School-Student-FAQs",fqs:[{q:"Will I be staring at a screen all day?",a:"No. Many lessons include reading, writing, projects, hands-on activities, and breaks away from the computer."},{q:"Do younger students spend less time online?",a:"Yes. Younger students often spend less time on screens and more time on offline learning activities."},{q:"Can I take breaks during my school day?",a:"Absolutely! Breaks are an important part of a healthy school day."}]},
  {npc:1,q:"How does K12 manage bullying?",a:"K12-powered schools take bullying seriously and work hard to create respectful learning environments. Schools provide guidance, reporting procedures, and support for students who experience bullying.",src:"https://www.k12.com/faq/results/",fqs:[{q:"What is cyberbullying?",a:"Cyberbullying is bullying that happens through online communication, social media, games, or digital platforms."},{q:"Can students report bullying?",a:"Yes. Students and families should report bullying concerns to school staff right away. Student safety is always our number 1 concern."},{q:"Does online school still have behavior rules?",a:"Absolutely! Students are expected to treat others respectfully in all school environments."}]},
  {npc:1,q:"How much teacher interaction is there with K12-powered schools?",a:"Students regularly interact with teachers through live classes, feedback on assignments, messages, office hours, and one-on-one support when needed. Teachers play an active role in helping students succeed.",src:"https://www.help.k12.com/s/article/K12-School-Student-FAQs",fqs:[{q:"Can I contact my teacher directly?",a:"Yes! Teachers can be contacted through the school's communication tools."},{q:"Will teachers help if I'm struggling?",a:"Absolutely. Teachers are there to answer questions and provide additional support."},{q:"Do real teachers grade my assignments?",a:"Yes. Teachers review student work and provide feedback."}]},
  {npc:1,q:"How do students interact in the online classroom?",a:"Students interact through live classes, discussions, chat tools, group activities, and collaborative projects. Online classrooms encourage participation and communication with both teachers and classmates.",src:"https://www.k12.com/faq/results/",fqs:[{q:"Can students talk during class?",a:"Yes! Depending on the class, students may use microphones, chat features, or discussion tools."},{q:"Do students work on projects together?",a:"Many courses include collaborative activities and group projects."}]},
  {npc:1,q:"How can K12-powered online learning benefit student socialization?",a:"Online learning gives students opportunities to connect through clubs, events, live classes, field trips, and online communities. Many students build friendships with peers from different backgrounds and locations.",src:"https://www.k12.com/faq/results/",fqs:[{q:"Can students make friends online?",a:"Absolutely! Many students form lasting friendships through classes and school activities."},{q:"Do students work together?",a:"Yes. Students often collaborate in discussions, projects, and activities."},{q:"Are there activities outside of class?",a:"Yes! Schools frequently offer clubs, events, and extracurricular opportunities."}]},
  {npc:1,q:"What materials are needed for online school?",a:"Students typically need a reliable internet connection and a computer or school-provided device. Depending on your grade and school, you may also receive learning materials, books, or hands-on activity kits.",src:"https://www.help.k12.com/s/article/K12-School-Student-FAQs",fqs:[{q:"Will the school provide materials?",a:"Many schools provide curriculum materials and learning resources."},{q:"Do I need special software?",a:"Your school will provide instructions for any required programs or tools."},{q:"Will I receive books?",a:"Many K12-powered schools provide books and other learning materials."}]},
  {npc:1,q:"Do K12-powered schools have extracurricular activities?",a:"Yes! Many K12-powered schools offer clubs, competitions, student organizations, field trips, and special events. These activities help students explore interests, develop skills, and make friends.",src:"https://www.k12.com/faq/results/",fqs:[{q:"Can I join more than one club?",a:"Often, yes! Students are encouraged to explore activities that interest them."},{q:"Are activities available for all grade levels?",a:"Yes, though available activities might differ depending on your grade level."},{q:"Do extracurriculars happen online or in person?",a:"Some activities are virtual while others may take place locally depending on the school."}]},
  {npc:1,q:"Am I able to have a flexible schedule?",a:"Yes, many K12-powered programs offer flexibility. While students still need to complete assignments and attend required activities, families often have more control over when learning happens.",src:"https://www.k12.com/how-online-learning-works/",fqs:[{q:"Do I have deadlines?",a:"Yes. Students are still expected to complete assignments and meet academic requirements."},{q:"Can I travel while attending online school?",a:"Policies vary by school, so check with your academy for specific guidelines."}]},
  {npc:1,q:"What is a typical day like?",a:"A typical day may include live classes, independent lessons, assignments, reading, and breaks. Every student's schedule can look a little different depending on their grade level and program.",src:"https://www.help.k12.com/s/article/K12-School-Student-FAQs",fqs:[{q:"Do students have lunch and breaks?",a:"Yes! Students typically have breaks throughout the day."},{q:"Is every day the same?",a:"Not always. Activities, assignments, and schedules may vary from day to day."},{q:"Can I work ahead?",a:"That depends on your school and course requirements."}]},
  {npc:1,q:"What will be expected of me as an online student?",a:"As an online student, you'll be expected to attend required classes, complete assignments, communicate respectfully, and take responsibility for your learning. Staying organized and managing your time are important skills for success.",src:"https://www.k12.com/faq/results/?faq-category=how-online-learning-works",fqs:[{q:"What if I fall behind?",a:"Reach out to your teacher as soon as possible so they can help create a plan."},{q:"How can I stay organized?",a:"Using calendars, schedules, and assignment checklists can be very helpful."}]},
  {npc:2,q:"Are there teachers and live classes?",a:"Yes! Students learn from state-certified teachers and attend live online classes called Class Connect sessions. Teachers provide instruction, answer questions, grade assignments, and help students succeed.",src:"https://www.help.k12.com/s/article/K12-School-Student-FAQs",fqs:[{q:"Can students ask teachers questions?",a:"Absolutely! Teachers are available during classes, office hours, and through school communication tools."},{q:"Do all classes meet live?",a:"Some classes include regular live sessions, while others also include independent learning activities."},{q:"What are Class Connect sessions?",a:"They're live online classes where students meet with teachers and classmates in real time."}]},
  {npc:2,q:"How will I access my courses and lessons?",a:"You'll access your courses through the Online School (OLS). Once you log in, you'll see your Dashboard where you can open courses, view assignments, and track your progress.",src:"https://www.help.k12.com/s/article/Course-Navigation-in-the-Online-School",fqs:[{q:"What is the Dashboard?",a:"The Dashboard is your home base where you can quickly access classes, announcements, and important information."},{q:"Can I access lessons from anywhere?",a:"Yes, as long as you have internet access and a compatible device."},{q:"Do I need a special login?",a:"Yes. Your school will provide login information when you enroll."}]},
  {npc:2,q:"How do I access Class Connect Sessions in the K12 OLS?",a:"To join a Class Connect Session, log into the OLS and look for the scheduled session in your course or calendar. Click the session link when it's time to attend.",src:"https://www.help.k12.com/s/article/How-to-Access-Class-Connect-in-the-K12-School-OLS",fqs:[{q:"Do I need to download anything?",a:"Most sessions open directly through supported browsers, but some schools may provide additional instructions."},{q:"What if I miss a session?",a:"Check with your teacher about available recordings or make-up options."},{q:"What if the class link doesn't work?",a:"Contact your teacher or school support team for help."}]},
  {npc:2,q:"What is the OLS?",a:"The OLS is your main learning platform where you'll access courses, assignments, and announcements.",src:"https://www.k12.com/",fqs:[{q:"What do assignments look like in the OLS?",a:"Check out the orientation resources or ask your teacher for an overview of a typical student assignment."}]},
  {npc:2,q:"How are my grades calculated?",a:"Grades are based on assignments, quizzes, tests, projects, participation, and other coursework. Each teacher and course may use a slightly different grading structure.",src:"https://www.help.k12.com/s/article/K12-School-Student-FAQs",fqs:[{q:"Where can I see my grades?",a:"You can view them in your learning platform's gradebook area."},{q:"Do all assignments count equally?",a:"Not always. Some assignments may be worth more points than others."},{q:"Can I improve my grade if I'm struggling?",a:"Absolutely! Talk with your teacher about ways to improve and stay on track."}]},
  {npc:2,q:"How do I receive notifications for due dates and announcements?",a:"The OLS and your courses provide announcements, reminders, and notifications to help you stay organized. Checking your Dashboard regularly is a great habit.",src:"https://www.help.k12.com/s/article/K12-School-Student-FAQs",fqs:[{q:"Where do notifications appear?",a:"They may appear on your Dashboard, course pages, or announcement areas."},{q:"Should I check every day?",a:"Yes! A quick daily check helps you stay informed."}]},
  {npc:2,q:"How do I navigate my courses?",a:"Each course is organized into lessons, activities, and assignments. Use the course menu to move between sections and follow the lesson sequence provided by your teacher.",src:"https://www.help.k12.com/s/article/Course-Navigation-in-the-Online-School",fqs:[{q:"Can I skip ahead?",a:"That depends on the course and your teacher's instructions."},{q:"How do I know what to do next?",a:"Your Dashboard and course pages usually highlight upcoming work."},{q:"Will there be tutorials?",a:"Yes! Orientation and teacher guidance can help you learn your way around."}]},
  {npc:2,q:"Where do I see announcements?",a:"You can usually find announcements on your Dashboard, course homepage, or class pages. It's a good idea to check them regularly so you don't miss important updates.",src:"https://www.help.k12.com/s/article/How-to-View-Announcements-in-Canvas",fqs:[{q:"Who posts announcements?",a:"Teachers, school staff, and administrators may all post announcements."},{q:"How often should I check?",a:"Checking daily is a great habit."}]},
  {npc:2,q:"How do I view my calendar?",a:"Your calendar can usually be found within the OLS or your learning platform. It helps you keep track of assignments, live classes, and important school events.",src:"https://www.help.k12.com/s/article/Using-the-Online-School-Calendar",fqs:[{q:"Can I see upcoming assignments?",a:"Yes! Many calendars display assignment due dates."},{q:"Will live classes appear there?",a:"Usually yes, including scheduled Class Connect Sessions."}]},
  {npc:2,q:"How do I view my grades?",a:"You can view your grades through the gradebook or grades section of your learning platform. Checking regularly can help you stay on top of your progress.",src:"https://www.help.k12.com/s/article/K12-School-OLS-View-Your-Grades",fqs:[{q:"Can my parents see my grades too?",a:"Yes! Parents and Learning Coaches often have access to student progress information."},{q:"How often are grades updated?",a:"That depends on when assignments are graded."},{q:"What if I think a grade is incorrect?",a:"Reach out to your teacher and ask for clarification."}]},
  {npc:2,q:"How do I find my student ID number?",a:"Your student ID number may appear in your student profile, school records, or enrollment documents. If you can't find it, your school office can help.",src:"https://www.help.k12.com/s/article/How-To-Find-Your-Student-ID-in-the-Parent-Portal",fqs:[{q:"Do I need my student ID often?",a:"You may need it for support requests, records, or school services."},{q:"Can my parent find it too?",a:"Yes, parents and Learning Coaches often have access to enrollment information."}]},
  {npc:2,q:"I don't see a course in the Dashboard. What do I do?",a:"Don't panic! Sometimes courses take time to appear, or they may not be available yet. If a course is missing, contact your teacher or school support team for assistance.",src:"https://www.help.k12.com/s/article/Where-Are-My-Courses",fqs:[{q:"Should I refresh or log out?",a:"Yes, that's a good first troubleshooting step."},{q:"Who can help if it still doesn't appear?",a:"Your teacher, school office, or technical support team can help."}]},
  {npc:2,q:"How do I know when my assignments are due?",a:"Assignment due dates are usually listed in your courses, calendar, and assignment pages. Checking your Dashboard each day is one of the best ways to stay organized and on track.",src:"https://www.help.k12.com/s/article/K12-School-Student-FAQs",fqs:[{q:"Will I get reminders?",a:"Many courses provide reminders and upcoming assignment lists."},{q:"Can due dates change?",a:"Sometimes, so be sure to check course announcements regularly."},{q:"What happens if I miss a due date?",a:"Contact your teacher as soon as possible to discuss next steps."}]},
  {npc:3,q:"How do I message my teacher?",a:"You can usually contact your teacher through your school's approved communication tools, such as messages within your learning platform or school email. Teachers are happy to help when you have questions!",src:"https://www.help.k12.com/s/article/K12-School-Email-Navigation",fqs:[{q:"When should I contact my teacher?",a:"Any time you need help understanding a lesson, assignment, or class expectation."},{q:"Can my parent contact my teacher too?",a:"Yes! Learning Coaches and parents can often communicate with teachers as well."}]},
  {npc:3,q:"My login is not working. What do I do?",a:"No worries — login problems happen sometimes! First, double-check that your username and password are entered correctly. If you're still having trouble, try resetting your password or contact your school's technical support team.",src:"https://www.help.k12.com/s/article/Online-School-Login-Troubleshooting",fqs:[{q:"What if I forgot my password?",a:"You can usually use the password recovery option on the login page or contact support for assistance."},{q:"Could my account be locked?",a:"Yes, multiple unsuccessful login attempts may temporarily lock an account for security reasons."}]},
  {npc:3,q:"How do I update my time zone settings?",a:"If your displayed times don't look right, you may need to update your time zone settings. Check your account settings or profile settings within the platform, and contact support if you need help.",src:"https://www.help.k12.com/s/article/K12-School-OLS-Update-Your-Time-Zone-Settings",fqs:[{q:"Why is my time zone important?",a:"It helps make sure your class schedules, due dates, and calendar events display correctly."},{q:"Will changing my time zone affect my assignments?",a:"It won't change your coursework, but it can affect how times are displayed."}]},

// Read ?npc= URL param to optionally restrict the question pool to a single NPC.
// e.g. ?npc=1 -> only npc 1's questions are available (not shown to user, used internally only).
function getNpcFilter(){
  const params=new URLSearchParams(window.location.search);
  const raw=params.get('npc');
  if(raw===null)return null;
  const n=parseInt(raw,10);
  if(Number.isNaN(n))return null;
  return n;
}
const NPC_FILTER=getNpcFilter();
const DATA=NPC_FILTER===null?ALL_DATA:ALL_DATA.filter(d=>d.npc===NPC_FILTER);

// Popular question indices (within the active DATA set) used as fallback suggestions.
// Recomputed relative to whichever DATA set is active so indices stay valid when filtered.
const POPULAR_SOURCE_QS=[
  "What courses are available at my virtual academy?",
  "What is the role of a Learning Coach?",
  "What is a typical day like?",
  "How are my grades calculated?",
  "How do I request technical support?",
  "Who do I contact if I have issues with my school-issued device?"
];
let POPULAR_IDXS=POPULAR_SOURCE_QS.map(q=>DATA.findIndex(d=>d.q===q)).filter(i=>i!==-1);
if(POPULAR_IDXS.length===0){
  POPULAR_IDXS=DATA.slice(0,Math.min(6,DATA.length)).map((_,i)=>i);
}

function levenshtein(a,b){const m=a.length,n=b.length;const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return dp[m][n]}
function fuzzyScore(query,target){const q=query.toLowerCase().trim(),t=target.toLowerCase();if(t.includes(q))return 100;const words=q.split(/\s+/);let score=0;for(const w of words){if(w.length<2)continue;if(t.includes(w)){score+=10;continue}const tWords=t.split(/\s+/);const best=Math.min(...tWords.map(tw=>levenshtein(w,tw)/(Math.max(w.length,tw.length))));if(best<0.4)score+=Math.round((1-best)*8);}return score;}
// Search is restricted to question text only (no NPC name/id matching).
function exactSearch(q){if(!q.trim())return[];const words=q.toLowerCase().split(/\s+/).filter(w=>w.length>1);return DATA.filter(d=>{const hay=(d.q+' '+d.a).toLowerCase();return words.every(w=>hay.includes(w));});}
function fuzzySearch(q,exclude){return DATA.filter(d=>!exclude.includes(d)).map(d=>({d,score:fuzzyScore(q,d.q.toLowerCase())})).filter(x=>x.score>4).sort((a,b)=>b.score-a.score).map(x=>({...x.d,_fuzzy:true}));}
function search(q){if(!q.trim())return{results:[],fuzzy:false};const exact=exactSearch(q);if(exact.length>=8)return{results:exact.slice(0,8),fuzzy:false};const fuzz=fuzzySearch(q,exact);const combined=[...exact,...fuzz].slice(0,8);return{results:combined,fuzzy:fuzz.length>0&&exact.length<combined.length};}
function highlight(text,q){const words=q.toLowerCase().split(/\s+/).filter(w=>w.length>1);let out=text;words.forEach(w=>{const re=new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');out=out.replace(re,'<strong>$1</strong>');});return out;}

const chat=document.getElementById('chat-area');
const input=document.getElementById('query');
const sendBtn=document.getElementById('send-btn');
const suggestBox=document.getElementById('suggest-box');
let activeIdx=-1,currentSuggestions=[];

function addMessage(html,type){const div=document.createElement('div');div.className='bubble '+type;div.innerHTML=html;chat.appendChild(div);chat.scrollTop=chat.scrollHeight;return div;}
function hideSuggestions(){suggestBox.style.display='none';suggestBox.innerHTML='';activeIdx=-1;currentSuggestions=[];}

function showSuggestions(q){
  if(!q.trim()){hideSuggestions();return;}
  const{results}=search(q);
  if(!results.length){hideSuggestions();return;}
  currentSuggestions=results;
  suggestBox.innerHTML=results.slice(0,6).map((r,i)=>`
    <div class="suggest-item" data-i="${i}">
      <i class="ti ti-search" aria-hidden="true" style="font-size:13px;color:var(--blue-500);flex-shrink:0"></i>
      <span class="suggest-q">${r.q}${r._fuzzy?'<span class="fuzzy-badge">similar</span>':''}</span>
    </div>`).join('');
  suggestBox.style.display='block';
  activeIdx=-1;
  suggestBox.querySelectorAll('.suggest-item').forEach(el=>{
    el.addEventListener('mousedown',e=>{e.preventDefault();selectSuggestion(parseInt(el.dataset.i));});
  });
}

function selectSuggestion(i){const item=currentSuggestions[i];hideSuggestions();input.value='';showAnswer(DATA.findIndex(d=>d.q===item.q));}

function showAnswer(idx){
  const d=DATA[idx];if(!d)return;
  addMessage(d.q,'user');
  let html=`<div style="font-size:13px;line-height:1.65">${d.a}</div>`;
  if(d.src)html+=`<span class="source-link"><i class="ti ti-external-link" aria-hidden="true" style="font-size:11px;vertical-align:-1px"></i> <a href="${d.src}" target="_blank">Learn more</a></span>`;
  if(d.fqs&&d.fqs.length){
    html+=`<div class="section-label">Follow-up questions</div><div class="followup-chips">`;
    d.fqs.forEach((fq,fi)=>{html+=`<button class="chip" data-fi="${fi}" data-pi="${idx}">${fq.q}</button>`;});
    html+=`</div>`;
  }
  const msg=addMessage(html,'bot');
  msg.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click',()=>{
      const fq=DATA[parseInt(chip.dataset.pi)].fqs[parseInt(chip.dataset.fi)];
      addMessage(fq.q,'user');
      addMessage(`<div style="font-size:13px;line-height:1.65">${fq.a}</div>`,'bot');
    });
  });
}

function showNoMatch(q){
  const popularItems=POPULAR_IDXS.map(i=>DATA[i]);
  const optionsList=popularItems.map((r,i)=>`<li class="result-item" data-idx="${POPULAR_IDXS[i]}">${r.q}</li>`).join('');
  const html=`
    <div class="no-answer-msg">Sorry, but I am unable to assist with this question. You can check out the <a href="https://www.k12.com/faq/" target="_blank">K12 FAQ page</a> or pick one of the options below:</div>
    <div class="popular-label"><i class="ti ti-star" aria-hidden="true" style="font-size:11px;vertical-align:-1px"></i> Popular questions</div>
    <ul class="result-list">${optionsList}</ul>`;
  const msg=addMessage(html,'bot');
  msg.querySelectorAll('.result-item').forEach(el=>{
    el.addEventListener('click',()=>showAnswer(parseInt(el.dataset.idx)));
  });
}

function handleSend(){
  const q=input.value.trim();
  hideSuggestions();
  if(!q)return;
  input.value='';
  addMessage(q,'user');
  const{results,fuzzy}=search(q);
  if(!results.length){showNoMatch(q);return;}
  const note=fuzzy?` <span style="font-size:11px;opacity:0.6">(includes similar matches)</span>`:'';
  const listItems=results.map((r,i)=>`<li class="result-item" data-idx="${DATA.findIndex(d=>d.q===r.q)}">${highlight(r.q,q)}${r._fuzzy?'<span class="fuzzy-badge">similar</span>':''}</li>`).join('');
  const msg=addMessage(`<div style="font-size:13px;margin-bottom:2px">Found <strong>${results.length}</strong> question${results.length>1?'s':''}${note}. Pick one:</div><ul class="result-list">${listItems}</ul>`,'bot');
  msg.querySelectorAll('.result-item').forEach(el=>{
    el.addEventListener('click',()=>showAnswer(parseInt(el.dataset.idx)));
  });
}

input.addEventListener('input',()=>showSuggestions(input.value));
input.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'){e.preventDefault();const items=suggestBox.querySelectorAll('.suggest-item');if(!items.length)return;activeIdx=Math.min(activeIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('active',i===activeIdx));}
  else if(e.key==='ArrowUp'){e.preventDefault();const items=suggestBox.querySelectorAll('.suggest-item');if(!items.length)return;activeIdx=Math.max(activeIdx-1,0);items.forEach((el,i)=>el.classList.toggle('active',i===activeIdx));}
  else if(e.key==='Enter'){if(activeIdx>=0&&currentSuggestions.length)selectSuggestion(activeIdx);else handleSend();}
  else if(e.key==='Escape')hideSuggestions();
});
input.addEventListener('blur',()=>setTimeout(hideSuggestions,150));
sendBtn.addEventListener('click',handleSend);

addMessage(`<div>Hi! I'm your K12 help guide. Start typing to see matching questions — or search topics like <em>schedule</em>, <em>login</em>, <em>clubs</em>, or <em>Learning Coach</em>.</div>`,'bot');
</script>
